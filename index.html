<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS | Santa Workshop 1960s</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #04040c;
            --surface: rgba(15, 15, 30, 0.9);
            --gold: #d4a843;
            --gold-bright: #f1c40f;
            --red: #c0392b;
            --text: #f0f0f5;
            --text-dim: #8e8e93;
            --border: rgba(212, 168, 67, 0.3);
            --radius: 25px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #0a0a20 0%, #04040c 100%);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden; /* Фикс для мобилок */
        }

        .app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header {
            background: var(--surface);
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--gold);
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
        .logo span { color: var(--text); font-weight: 300; }

        /* Content Area */
        .content { flex: 1; padding: 20px 15px 180px; overflow-y: auto; scroll-behavior: smooth; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Retro Elements */
        .card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 20px; 
            margin-bottom: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* NY Countdown */
        .ny-card {
            background: linear-gradient(145deg, rgba(212,168,67,0.15), rgba(0,0,0,0));
            border: 2px solid var(--gold); border-radius: 30px; padding: 35px 20px; text-align: center;
            position: relative; overflow: hidden;
        }
        .ny-days { font-size: 70px; font-weight: 900; color: var(--gold); text-shadow: 0 0 25px rgba(212,168,67,0.5); line-height: 1; }

        /* Vinyl Player Fixed */
        .retro-player {
            position: fixed; bottom: 90px; left: 15px; right: 15px; max-width: 450px; margin: 0 auto;
            background: linear-gradient(145deg, #151525, #0a0a15);
            border: 1px solid var(--gold); border-radius: 30px;
            padding: 12px 20px; z-index: 900;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .vinyl-box { width: 55px; height: 55px; position: relative; flex-shrink: 0; }
        .vinyl {
            width: 100%; height: 100%; background: #050505; border-radius: 50%;
            border: 3px solid #1a1a1a; display: flex; align-items: center; justify-content: center;
            transition: transform 0.5s ease-in-out;
        }
        .vinyl.playing { animation: spin 4s linear infinite; }
        .vinyl::before { content:''; position: absolute; inset: 5px; border: 1px solid #222; border-radius: 50%; }
        .vinyl::after { content:''; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; z-index: 2; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-controls { flex: 1; min-width: 0; }
        .track-title { font-size: 14px; font-weight: bold; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .control-btns { display: flex; align-items: center; gap: 20px; margin-top: 8px; }
        .btn-play { background: var(--gold); color: #000; width: 35px; height: 35px; border-radius: 50%; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Nav Bar */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: rgba(5, 5, 15, 0.95); border-top: 1px solid var(--gold);
            display: flex; justify-content: space-around; padding: 15px 10px; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-link { 
            background: none; border: none; color: var(--text-dim); 
            display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 6px; transition: 0.3s;
        }
        .nav-link.active { color: var(--gold); transform: translateY(-3px); }
        .nav-link i { font-size: 22px; }

        /* Auth UI */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px);
        }
        .overlay.active { display: flex; }
        .auth-box {
            background: #0f0f1f; border: 2px solid var(--gold); border-radius: 35px;
            padding: 40px 30px; width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 0 50px rgba(212, 168, 67, 0.2);
        }
        .auth-box input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px;
            border: 1px solid var(--border); background: #050510; color: white; outline: none;
        }
        .btn-gold {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: var(--gold); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Nexus News */
        .nexus-badge { background: var(--red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }

    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="logo">SANTA <span>RETRO 60s</span></div>
        <div id="user-zone"></div>
    </header>

    <div class="content">
        <!-- HOME PAGE -->
        <div class="page active" id="home">
            <div class="ny-card">
                <div class="ny-days" id="ny-days">0</div>
                <div style="font-size:11px; letter-spacing:4px; color:var(--gold); margin-top:10px; font-weight: bold;">ДНЕЙ ДО НОВОГО ГОДА</div>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:15px;">
                <div class="card" style="margin:0; text-align:center;">
                    <div id="s-users" style="font-size:26px; color:var(--gold); font-weight:900;">0</div>
                    <div style="font-size:10px; color:var(--text-dim); letter-spacing:1px;">ЭЛЬФОВ</div>
                </div>
                <div class="card" style="margin:0; text-align:center;">
                    <div id="s-chat" style="font-size:26px; color:var(--gold); font-weight:900;">0</div>
                    <div style="font-size:10px; color:var(--text-dim); letter-spacing:1px;">СИГНАЛОВ</div>
                </div>
            </div>

            <div class="card" style="margin-top:15px;">
                <h3 style="color:var(--gold); margin-bottom:15px; font-size:16px;"><i class="fa-solid fa-tower-broadcast"></i> ЛЕНТА ОБНОВЛЕНИЙ</h3>
                <div id="news-feed"></div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div class="page" id="chat">
            <div class="card" style="display:flex; flex-direction:column; height: 500px;">
                <div id="chat-messages" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
                <div style="display:flex; gap:10px; margin-top:15px; padding-top:10px; border-top:1px solid var(--border);">
                    <input type="text" id="m-input" placeholder="Шифрованное сообщение..." style="flex:1; padding:14px; border-radius:15px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:white; outline:none;">
                    <button onclick="sendMsg()" class="btn-play" style="flex-shrink:0;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- PROFILE PAGE -->
        <div class="page" id="profile">
            <div class="card" style="text-align:center;">
                <div style="position:relative; display:inline-block;">
                    <img id="p-avatar" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--gold); padding:5px; object-fit: cover;">
                </div>
                <h2 id="p-username" style="margin-top:15px; color:var(--gold);"></h2>
                <div id="p-role" style="margin-top:5px;"></div>
                <div id="p-status" style="font-size:13px; color:var(--text-dim); margin:15px 0; font-style: italic;"></div>
                
                <!-- Hidden Admin Panel for Santa -->
                <div id="nexus-admin-panel" style="display:none; border-top:1px solid var(--border); margin-top:20px; padding-top:20px; text-align:left;">
                    <h4 style="color:var(--gold); font-size:12px; margin-bottom:10px;"><i class="fa-solid fa-microchip"></i> NEXUS CONTROL UNIT</h4>
                    <div style="font-size:11px; background:#000; padding:10px; border-radius:10px; color:#0f0; font-family:monospace;">
                        > Protocol: SILENT_AUTONOMY<br>
                        > Scan Rate: 14.2/sec<br>
                        > Active Exploits: 8
                    </div>
                </div>
            </div>
            <button class="btn-gold" style="background:var(--red); color:white; margin-top:10px;" onclick="logout()">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>

    <!-- Retro Player -->
    <div class="retro-player">
        <div class="vinyl-box">
            <div class="vinyl" id="vinyl-rec"></div>
        </div>
        <div class="player-controls">
            <div class="track-title" id="t-name">Loading...</div>
            <div class="track-artist" id="t-artist">Retro Radio</div>
            <div class="control-btns">
                <i class="fa-solid fa-backward" onclick="changeSong(-1)" style="color:var(--gold); cursor:pointer;"></i>
                <button class="btn-play" onclick="playPause()" id="p-btn"><i class="fa-solid fa-play"></i></button>
                <i class="fa-solid fa-forward" onclick="changeSong(1)" style="color:var(--gold); cursor:pointer;"></i>
            </div>
        </div>
    </div>

    <!-- Nav Bar -->
    <nav class="nav-bar">
        <button class="nav-link active" onclick="nav('home')"><i class="fa-solid fa-house-chimney"></i>Главная</button>
        <button class="nav-link" onclick="nav('chat')"><i class="fa-solid fa-comment-dots"></i>Канал</button>
        <button class="nav-link" onclick="nav('profile')"><i class="fa-solid fa-user-shield"></i>Личность</button>
    </nav>
</div>

<!-- Auth Modal -->
<div class="overlay" id="auth-modal">
    <div class="auth-box">
        <div style="font-size:40px; margin-bottom:20px; filter: drop-shadow(0 0 10px var(--gold));">🎅</div>
        <h2 style="color:var(--gold); margin-bottom:25px; letter-spacing:2px;">АВТОРИЗАЦИЯ</h2>
        <input type="text" id="auth-u" placeholder="Идентификатор">
        <input type="password" id="auth-p" placeholder="Ключ доступа">
        <button class="btn-gold" onclick="doAuth()">ПОДТВЕРДИТЬ</button>
        <p style="font-size:11px; margin-top:20px; color:var(--text-dim);">Доступ только для участников протокола NEXUS</p>
    </div>
</div>

<script>
// --- ПЛЕЙЛИСТ 60-Х (30 ТРЕКОВ) ---
const PLAYLIST = [
    { n: "It's the Most Wonderful Time", a: "Andy Williams (1963)" },
    { n: "Rockin' Around the Christmas Tree", a: "Brenda Lee (1958)" },
    { n: "A Holly Jolly Christmas", a: "Burl Ives (1964)" },
    { n: "Sleigh Ride", a: "The Ronettes (1963)" },
    { n: "White Christmas", a: "Dean Martin (1966)" },
    { n: "Blue Christmas", a: "Elvis Presley (1964)" },
    { n: "The Christmas Song", a: "Nat King Cole (1961)" },
    { n: "Jingle Bell Rock", a: "Bobby Helms (1957)" },
    { n: "Santa Claus Is Comin' to Town", a: "Frank Sinatra (1967)" },
    { n: "Little Saint Nick", a: "The Beach Boys (1963)" },
    { n: "Baby, It's Cold Outside", a: "Ray Charles (1966)" },
    { n: "Merry Christmas Darling", a: "The Carpenters (1970)" },
    { n: "Run Rudolph Run", a: "Chuck Berry (1958)" },
    { n: "Santa Baby", a: "Eartha Kitt (1953)" },
    { n: "Winter Wonderland", a: "Tony Bennett (1968)" },
    { n: "Silver Bells", a: "Bing Crosby (1950)" },
    { n: "Let It Snow! Let It Snow!", a: "Dean Martin (1959)" },
    { n: "Marshmallow World", a: "Darlene Love (1963)" },
    { n: "Christmas (Baby Please Come Home)", a: "Darlene Love (1963)" },
    { n: "Rudolph the Red-Nosed Reindeer", a: "The Temptations (1968)" },
    { n: "Deck the Halls", a: "The Everly Brothers (1962)" },
    { n: "Frosty the Snowman", a: "The Ronettes (1963)" },
    { n: "Have Yourself a Merry Little Christmas", a: "Ella Fitzgerald (1960)" },
    { n: "Feliz Navidad", a: "José Feliciano (1970)" },
    { n: "The Little Drummer Boy", a: "The Harry Simeone Chorale (1958)" },
    { n: "Mele Kalikimaka", a: "Bing Crosby (1950)" },
    { n: "I'll Be Home for Christmas", a: "Elvis Presley (1957)" },
    { n: "I Saw Mommy Kissing Santa Claus", a: "The Jackson 5 (1970)" },
    { n: "Here Comes Santa Claus", a: "Gene Autry (1947)" },
    { n: "What Christmas Means to Me", a: "Stevie Wonder (1967)" }
];

let curIdx = 0, playing = false, audio = new Audio();
const storage = {
    get: (k, d) => JSON.parse(localStorage.getItem('sw_'+k)) || d,
    set: (k, v) => localStorage.setItem('sw_'+k, JSON.stringify(v))
};

// Директор Санта уже в базе по умолчанию
let users = storage.get('users', [{id:1, user:'Santa', pass:'admin', role:'Director', ava:'https://i.postimg.cc/85zXp9z5/santa-avatar.jpg', status:'🎅 Архитектор Протокола NEXUS'}]);
let msgs = storage.get('msgs', []);
let news = storage.get('news', [{t:'Система запущена', c:'Протокол Silent Autonomy активирован. Мониторинг сети начат.'}]);
let session = storage.get('session', null);

function loadTrack(idx) {
    const t = PLAYLIST[idx];
    document.getElementById('t-name').innerText = t.n;
    document.getElementById('t-artist').innerText = t.a;
    audio.src = `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-${(idx % 15) + 1}.mp3`;
}

function playPause() {
    if(playing) {
        audio.pause();
    } else {
        audio.play().catch(() => toast("Нажмите еще раз"));
    }
    playing = !playing;
    document.getElementById('p-btn').innerHTML = playing ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
    document.getElementById('vinyl-rec').classList.toggle('playing', playing);
}

function changeSong(dir) {
    curIdx = (curIdx + dir + PLAYLIST.length) % PLAYLIST.length;
    loadTrack(curIdx);
    if(playing) audio.play();
}

function nav(id) {
    if(id === 'profile' && !session) return document.getElementById('auth-modal').classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    
    // Подсветка активной кнопки
    const activeBtn = Array.from(document.querySelectorAll('.nav-link')).find(btn => btn.innerText.toLowerCase().includes(id === 'chat' ? 'канал' : id === 'profile' ? 'личность' : 'главная'));
    if(activeBtn) activeBtn.classList.add('active');

    if(id === 'home') renderHome();
    if(id === 'chat') renderChat();
    if(id === 'profile') renderProfile();
}

function doAuth() {
    const u = document.getElementById('auth-u').value, p = document.getElementById('auth-p').value;
    const found = users.find(x => x.user === u && x.pass === p);
    if(found) {
        session = found; storage.set('session', session);
        document.getElementById('auth-modal').classList.remove('active');
        updateHeader(); toast('Доступ разрешен, Директор');
        renderHome();
    } else toast('Отказ в доступе');
}

function logout() { session = null; storage.set('session', null); location.reload(); }

function sendMsg() {
    if(!session) return;
    const i = document.getElementById('m-input');
    if(!i.value) return;
    msgs.push({ u: session.user, a: session.ava, t: i.value, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
    storage.set('msgs', msgs); i.value = ''; renderChat();
}

function renderChat() {
    const b = document.getElementById('chat-messages');
    b.innerHTML = msgs.map(m => `
        <div style="margin-bottom:15px; display:flex; gap:12px; animation: fadeIn 0.3s;">
            <img src="${m.a}" style="width:35px; height:35px; border-radius:50%; border:1px solid var(--gold);">
            <div style="background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:10px 15px; border-radius:20px; flex:1;">
                <div style="font-size:11px; color:var(--gold); font-weight:bold; display:flex; justify-content:space-between;">
                    <span>${m.u}</span>
                    <span style="color:var(--text-dim); font-weight:normal;">${m.time}</span>
                </div>
                <div style="font-size:13px; margin-top:4px; line-height:1.4;">${m.t}</div>
            </div>
        </div>
    `).join('');
    b.scrollTop = b.scrollHeight;
}

function renderHome() {
    const now = new Date();
    const target = new Date(2026, 11, 31, 23, 59, 59);
    const diff = target - now;
    document.getElementById('ny-days').innerText = Math.max(0, Math.floor(diff/86400000));
    
    document.getElementById('s-users').innerText = users.length;
    document.getElementById('s-chat').innerText = msgs.length;

    let displayNews = [...news];
    if(session && session.user === 'Santa') {
        displayNews.unshift({t: 'NEXUS SYSTEM', c: 'Все узлы стабильны. Обнаружено 4 новых уязвимости в мастер-серверах.'});
    }

    document.getElementById('news-feed').innerHTML = displayNews.map(n => `
        <div style="border-bottom:1px solid var(--border); padding:12px 0;">
            <b style="color:var(--gold); font-size:13px;">${n.t} ${n.t.includes('NEXUS') ? '<span class="nexus-badge">ACTIVE</span>' : ''}</b><br>
            <span style="font-size:11px; color:var(--text-dim); line-height:1.4; display:block; margin-top:3px;">${n.c}</span>
        </div>
    `).join('');
}

function renderProfile() {
    if(!session) return;
    document.getElementById('p-avatar').src = session.ava;
    document.getElementById('p-username').innerText = session.user;
    document.getElementById('p-status').innerText = session.status;
    document.getElementById('p-role').innerHTML = `<span style="background:var(--gold); color:#000; padding:4px 15px; border-radius:15px; font-size:11px; font-weight:900; text-transform:uppercase;">${session.role}</span>`;
    
    // Показываем админку только Директору
    document.getElementById('nexus-admin-panel').style.display = (session.user === 'Santa') ? 'block' : 'none';
}

function updateHeader() {
    const z = document.getElementById('user-zone');
    z.innerHTML = session ? 
        `<img src="${session.ava}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--gold); cursor:pointer;" onclick="nav('profile')">` : 
        `<button onclick="document.getElementById('auth-modal').classList.add('active')" style="background:none; border:2px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:10px; font-weight:bold; font-size:12px;">ВХОД</button>`;
}

function toast(m) {
    const t = document.createElement('div');
    t.style = "position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--gold); color:#000; padding:12px 25px; border-radius:50px; font-size:13px; font-weight:900; z-index:3000; box-shadow:0 10px 30px rgba(0,0,0,0.5); text-transform:uppercase;";
    t.innerText = m; document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = '0.5s'; setTimeout(() => t.remove(), 500); }, 2000);
}

// Инициализация
window.onload = () => {
    loadTrack(0);
    updateHeader();
    renderHome();
    audio.addEventListener('ended', () => changeSong(1));
};
</script>

</body>
</html>
