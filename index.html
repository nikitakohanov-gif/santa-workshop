<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS | SANTA WORKSHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: rgba(10, 14, 20, 0.8); --gold: #d4a843; --gold-dim: #8b6d2d;
            --ice: #e0f2f7; --border: rgba(255, 255, 255, 0.05); --text: #ffffff; --text-dim: #667085;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

        .app { display:flex; height:100vh; position:relative; }

        /* SIDEBAR: CLEAN MINIMALISM */
        .sidebar {
            width:240px; background:#000; border-right:1px solid var(--border);
            display:flex; flex-direction:column; padding:30px 0; z-index:100;
        }
        .logo {
            font-family:'Cinzel', serif; font-size:18px; letter-spacing:6px; color:var(--gold);
            text-align:center; margin-bottom:40px; font-weight:900;
        }
        .nav { flex:1; padding:0 20px; }
        .nav-link {
            display:block; width:100%; padding:12px 15px; margin-bottom:5px;
            background:none; border:none; color:var(--text-dim); text-align:left;
            font-size:11px; text-transform:uppercase; letter-spacing:2px;
            cursor:pointer; transition: 0.3s; border-radius: 4px;
        }
        .nav-link:hover { color:var(--gold); background: rgba(212,168,67,0.05); }
        .nav-link.active { color:var(--text); background: rgba(255,255,255,0.05); border-left: 2px solid var(--gold); }

        /* MAIN CONTENT */
        .main { flex:1; display:flex; flex-direction:column; background: radial-gradient(circle at center, #0d1117 0%, #05070a 100%); position:relative; }
        .header {
            padding:20px 40px; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center; background: rgba(0,0,0,0.2);
        }
        .header-status { font-size:10px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; }
        .header-status span { color:var(--gold); font-weight:bold; }

        .content { flex:1; overflow-y:auto; padding:40px; }
        .page { display:none; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page.active { display:block; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        /* WELCOME SECTION */
        .welcome-center {
            height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;
        }
        .welcome-title { font-family:'Cinzel', serif; font-size:48px; font-weight:900; margin-bottom:20px; letter-spacing:10px; color:var(--text); }
        .welcome-subtitle { font-size:14px; color:var(--text-dim); max-width:500px; line-height:1.8; letter-spacing:1px; }
        .divider { width:60px; height:2px; background:var(--gold); margin:30px 0; }

        /* DATA CARDS */
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top:30px; }
        .card { 
            background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:25px; 
            transition: 0.3s; position:relative; overflow:hidden;
        }
        .card:hover { border-color: var(--gold-dim); transform: translateY(-5px); }
        .card-tag { font-size:9px; color:var(--gold); text-transform:uppercase; letter-spacing:2px; margin-bottom:15px; display:block; }
        .card-title { font-family:'Cinzel', serif; font-size:18px; margin-bottom:10px; color:var(--ice); }
        .card-text { font-size:13px; color:var(--text-dim); line-height:1.6; }

        /* CHAT STYLE */
        .chat-container { height:500px; display:flex; flex-direction:column; border:1px solid var(--border); background:rgba(0,0,0,0.2); }
        .chat-msgs { flex:1; overflow-y:auto; padding:20px; }
        .msg { margin-bottom:20px; }
        .msg-meta { font-size:10px; color:var(--gold); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
        .msg-body { font-size:13px; color:var(--text); line-height:1.5; padding-left:10px; border-left:1px solid var(--gold-dim); }
        .chat-input { padding:20px; display:flex; gap:10px; border-top:1px solid var(--border); }
        input { 
            flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border); 
            padding:12px 20px; color:#fff; font-size:12px; outline:none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }
        .btn-send { background:var(--gold); color:#000; border:none; padding:0 25px; font-weight:bold; cursor:pointer; text-transform:uppercase; font-size:10px; }

        /* FOOTER COUNTER */
        .footer-bar {
            padding:15px 40px; border-top:1px solid var(--border); display:flex; justify-content:space-between;
            font-size:10px; color:var(--text-dim); letter-spacing:1px; background:rgba(0,0,0,0.3);
        }

        /* CUSTOM SCROLL */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:var(--gold-dim); }

        @media (max-width:768px) {
            .sidebar { width:0; display:none; }
            .welcome-title { font-size:32px; }
        }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">NEXUS</div>
        <nav class="nav" id="sidebar-nav">
            <!-- Nav links added by JS -->
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div class="header-status">System Status: <span>Operational</span></div>
            <div id="auth-zone">
                <button onclick="showLogin()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:11px; letter-spacing:1px;">IDENTIFY_USER</button>
            </div>
        </header>

        <div class="content" id="main-content">
            <!-- Pages rendered here -->
        </div>

        <div class="footer-bar">
            <div>OBJECTIVE: NEW YEAR 2027</div>
            <div id="ny-timer">-- DAYS LEFT</div>
        </div>
    </main>
</div>

<!-- Login Modal -->
<div id="login-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#0a0a0a; border:1px solid var(--gold); padding:40px; width:300px; text-align:center;">
        <div class="logo">AUTH</div>
        <input type="text" id="login-u" placeholder="USERNAME" style="margin-bottom:10px;">
        <input type="password" id="login-p" placeholder="CREDENTIALS" style="margin-bottom:20px;">
        <button class="btn-send" onclick="doLogin()" style="width:100%; height:40px;">ACCESS</button>
    </div>
</div>

<script>
// DATABASE
const DB = {
    get(k,d){ return JSON.parse(localStorage.getItem('nx_'+k))||d; },
    set(k,v){ localStorage.setItem('nx_'+k,JSON.stringify(v)); }
};

let session = DB.get('session', null);
let messages = DB.get('chat', [
    {u:'SYSTEM', t:'Протокол Nexus инициирован.', d:'12:00'},
    {u:'Santa', t:'Приветствую в главном узле управления.', d:'12:05'}
]);

const PAGES = {
    home: `
        <div class="welcome-center">
            <div class="welcome-subtitle">ESTABLISHED 2026</div>
            <h1 class="welcome-title">SANTA WORKSHOP</h1>
            <div class="divider"></div>
            <p class="welcome-subtitle">Автономный узел управления проектом "NEXUS". <br>Синхронизация данных, управление эльфами и разработка инструментов будущего.</p>
            <div style="margin-top:40px;">
                <button onclick="nav('chat')" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:15px 40px; letter-spacing:3px; cursor:pointer; font-size:10px;">ENTER_CHANNEL</button>
            </div>
        </div>
    `,
    rules: `
        <div class="welcome-center" style="justify-content: flex-start; text-align: left; align-items: flex-start;">
            <span class="card-tag">Foundation</span>
            <h1 class="welcome-title" style="font-size:32px; letter-spacing:5px;">КОДЕКС_СИСТЕМЫ</h1>
            <div class="grid">
                <div class="card">
                    <span class="card-tag">Protocol 01</span>
                    <h3 class="card-title">Анонимность</h3>
                    <p class="card-text">Личность каждого участника Workshop защищена сквозным шифрованием. Раскрытие данных карается исключением.</p>
                </div>
                <div class="card">
                    <span class="card-tag">Protocol 02</span>
                    <h3 class="card-title">Иерархия</h3>
                    <p class="card-text">Слово Директора (Santa) является финальной командой для всех узлов системы.</p>
                </div>
                <div class="card">
                    <span class="card-tag">Protocol 03</span>
                    <h3 class="card-title">Чистота</h3>
                    <p class="card-text">Никакого спама, рекламы или деструктивного кода в общих каналах связи.</p>
                </div>
            </div>
        </div>
    `,
    chat: `
        <div style="height:100%; display:flex; flex-direction:column;">
            <div class="chat-container">
                <div class="chat-msgs" id="chat-flow"></div>
                <div class="chat-input">
                    <input type="text" id="ci" placeholder="Введите сообщение для узла...">
                    <button class="btn-send" onclick="send()">SEND</button>
                </div>
            </div>
        </div>
    `,
    about: `
         <div class="welcome-center" style="text-align: left; align-items: flex-start;">
            <span class="card-tag">Information</span>
            <h1 class="welcome-title" style="font-size:32px;">O_ПРОЕКТЕ</h1>
            <div class="card" style="width:100%;">
                <p class="card-text">NEXUS — это зашифрованная среда для координации творческих и технических групп. Мы переосмыслили мастерскую Санты как цифровой бастион, где каждый "подарок" — это строка кода, а каждый "эльф" — архитектор новой реальности.</p>
            </div>
        </div>
    `,
    support: `
        <div class="welcome-center">
            <h1 class="welcome-title" style="font-size:24px;">СВЯЗЬ_С_ЦЕНТРОМ</h1>
            <input type="text" placeholder="THEME" style="max-width:400px; margin-bottom:10px;">
            <textarea placeholder="MESSAGE" style="width:100%; max-width:400px; height:100px; background:rgba(255,255,255,0.03); border:1px solid var(--border); color:#fff; padding:15px; outline:none; font-family:inherit; font-size:12px; margin-bottom:20px;"></textarea>
            <button class="btn-send" style="height:50px; padding:0 50px;">SEND_SIGNAL</button>
        </div>
    `
};

const MENU = [
    {id:'home', label:'Главная'},
    {id:'rules', label:'Кодекс'},
    {id:'chat', label:'Канал'},
    {id:'about', label:'О проекте'},
    {id:'support', label:'Поддержка'}
];

function nav(id) {
    document.getElementById('main-content').innerHTML = `<div class="page active">${PAGES[id]}</div>`;
    document.querySelectorAll('.nav-link').forEach(b => {
        b.classList.toggle('active', b.getAttribute('onclick').includes(id));
    });
    if(id === 'chat') renderChat();
    updateHeader();
}

function renderChat() {
    const flow = document.getElementById('chat-flow');
    if(!flow) return;
    flow.innerHTML = messages.map(m => `
        <div class="msg">
            <div class="msg-meta">${m.u} // ${m.d}</div>
            <div class="msg-body">${m.t}</div>
        </div>
    `).join('');
    flow.scrollTop = flow.scrollHeight;
}

function send() {
    const i = document.getElementById('ci');
    if(!i.value || !session) return;
    messages.push({ u: session.u, t: i.value, d: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    i.value = '';
    DB.set('chat', messages);
    renderChat();
}

function updateHeader() {
    const az = document.getElementById('auth-zone');
    if(session) {
        az.innerHTML = `<span style="font-size:11px; letter-spacing:1px; color:var(--gold)">USER_ID: ${session.u}</span> <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-left:15px; font-size:10px;">[EXIT]</button>`;
    }
}

function showLogin() { document.getElementById('login-modal').style.display = 'flex'; }
function doLogin() {
    const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
    if(u === 'Santa' && p === 'admin') {
        session = {u: 'Santa'};
        DB.set('session', session);
        document.getElementById('login-modal').style.display = 'none';
        updateHeader();
        nav('home');
    }
}
function logout() { session = null; DB.set('session', null); location.reload(); }

function init() {
    document.getElementById('sidebar-nav').innerHTML = MENU.map(m => 
        `<button class="nav-link" onclick="nav('${m.id}')">${m.label}</button>`
    ).join('');
    
    const now = new Date(), ny = new Date(2027, 0, 1);
    document.getElementById('ny-timer').innerText = Math.ceil((ny-now)/86400000) + " DAYS LEFT";
    
    nav('home');
}

init();
</script>

</body>
</html>
