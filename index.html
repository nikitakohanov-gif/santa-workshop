<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SANTA GLOBAL TECH | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        :root{
            --accent:#e63946; --gold:#ffb703; --success:#2a9d8f;
            --bg:#05070a; --panel:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
            --text-main:#e0e1dd; --text-dim:#8b8c89;
        }
        *{box-sizing:border-box;font-family:Inter, sans-serif}
        html,body{height:100%;margin:0;background:var(--bg);color:var(--text-main)}
        body{display:flex;overflow:hidden}

        /* Header lights */
        canvas#snow{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0.5}
        .header-lights{position:fixed;top:0;left:0;width:100%;height:6px;display:flex;z-index:1000}
        .light-seg{flex:1;height:100%;transition:1s;animation:pulse 2s infinite alternate}
        @keyframes pulse{from{opacity:.3;filter:blur(2px)}to{opacity:1;filter:blur(0)}}

        /* Sidebar */
        .sidebar{width:280px;background:rgba(10,12,16,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;backdrop-filter:blur(18px);z-index:100;transition:0.25s}
        .brand{padding:28px;display:flex;align-items:center;gap:12px}
        .brand-logo{width:44px;height:44px;background:var(--accent);border-radius:10px;display:grid;place-items:center;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(230,57,70,.35)}
        .brand-name{font-family:'Marck Script',cursive;color:var(--gold);font-size:20px}
        .nav-group{padding:0 12px;flex:1;overflow:auto}
        .nav-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px 8px}
        .nav-link{display:flex;align-items:center;padding:10px 12px;border-radius:10px;color:var(--text-dim);text-decoration:none;cursor:pointer;margin-bottom:6px;gap:10px}
        .nav-link:hover{background:var(--panel);color:#fff}
        .nav-link.active{background:rgba(230,57,70,0.08);color:var(--accent);border:1px solid rgba(230,57,70,0.14)}
        .nav-link i{width:20px;text-align:center}

        /* Main stage */
        .stage{flex:1;display:flex;flex-direction:column;min-height:0}
        .topbar{height:70px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(5,7,10,0.45);backdrop-filter:blur(8px)}
        .search-box{display:flex;align-items:center;background:var(--panel);border:1px solid var(--border);padding:8px 12px;border-radius:10px;width:320px}
        .search-box input{background:none;border:none;color:var(--text-main);outline:none;margin-left:8px;width:100%}
        .user-actions{display:flex;align-items:center;gap:16px}
        .notif-bell{position:relative;cursor:pointer;color:var(--text-dim)}
        .notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--accent);border-radius:50%;border:2px solid var(--bg)}

        .content-scroll{flex:1;overflow:auto;padding:26px 28px;min-height:0}

        /* Cards/grid */
        .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:22px}
        .stat-card{background:var(--panel);border:1px solid var(--border);padding:18px;border-radius:16px}
        .stat-val{font-size:26px;font-weight:700;color:#fff;margin:8px 0}
        .stat-label{color:var(--text-dim);font-size:13px;display:flex;align-items:center;gap:6px}

        /* Profile */
        .profile-hero{display:flex;gap:24px;background:linear-gradient(135deg,rgba(230,57,70,0.06),transparent);padding:22px;border-radius:16px;border:1px solid var(--border);margin-bottom:20px;align-items:center}
        .avatar{width:110px;height:110px;border-radius:18px;background:url('https://img.icons8.com/color/200/santa.png') center/cover;border:4px solid var(--bg);box-shadow:0 18px 32px rgba(0,0,0,0.45)}
        .profile-badge{background:var(--gold);color:#000;padding:6px 12px;border-radius:8px;font-weight:800;font-size:11px;text-transform:uppercase}

        .progress-bar{height:8px;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;margin-top:8px}
        .progress-fill{height:100%;background:var(--accent);transition:1s}

        /* Buttons */
        .btn{padding:10px 14px;border-radius:12px;border:none;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-outline{background:none;border:1px solid var(--border);color:#fff}

        /* Login */
        #login-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:grid;place-items:center}
        .login-card{width:100%;max-width:420px;text-align:center;padding:36px;background:var(--panel);border-radius:18px;border:1px solid var(--border);backdrop-filter:blur(20px)}

        /* Chat */
        .chat-window{display:flex;flex-direction:column;height:420px}
        .chat-messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
        .chat-input{display:flex;gap:10px;padding-top:10px}
        .chat-input input{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-main);outline:none}
        .chat-msg{display:flex;gap:10px;align-items:flex-start}

        /* Audio player */
        .player{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;background:var(--panel);border:1px solid var(--border)}
        .vinyl{width:42px;height:42px;border-radius:50%;background:linear-gradient(180deg,#fff, #ccc);display:grid;place-items:center;transform-origin:center;transition:transform .6s linear}
        .vinyl.playing{animation:spin 3s linear infinite}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

        /* Responsive */
        @media(max-width:900px){
            .sidebar{position:fixed;left:-320px;top:0;height:100%;z-index:300;transition:0.3s}
            .sidebar.open{left:0}
            body.showing-sidebar{overflow:hidden}
            .topbar{padding:0 12px}
            .search-box{display:none}
        }
        .hidden{display:none!important}
    </style>
</head>
<body>
    <canvas id="snow"></canvas>
    <div class="header-lights" id="lights"></div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-card" role="dialog" aria-labelledby="login-title">
            <div class="brand-logo" style="margin:0 auto 12px;width:64px;height:64px;font-size:24px">S</div>
            <h2 id="login-title" style="margin-bottom:6px">Корпоративный вход</h2>
            <p style="color:var(--text-dim);margin-bottom:18px">Система управления Santa Global Tech</p>
            <input id="pass" type="password" placeholder="Ключ доступа (admin)" style="width:100%;padding:14px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.45);color:var(--text-main);margin-bottom:14px;outline:none">
            <div style="display:flex;gap:8px">
                <button class="btn btn-primary" style="flex:1" onclick="login()">Авторизоваться</button>
                <button class="btn btn-outline" onclick="demoLogin()">Демо</button>
            </div>
            <p id="login-hint" style="margin-top:12px;color:var(--text-dim);font-size:13px">Пароль: <b>admin</b></p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-logo">S</div>
            <div class="brand-name">SantaCorp</div>
        </div>
        <div class="nav-group" id="navgroup">
            <div class="nav-label">Аналитика</div>
            <div class="nav-link active" data-target="dash"><i>📊</i><span>Дашборд</span></div>
            <div class="nav-link" data-target="factory"><i>🏭</i><span>Производство</span></div>

            <div class="nav-label">Команда</div>
            <div class="nav-link" data-target="elves"><i>🧝</i><span>Эльфы</span></div>
            <div class="nav-link" data-target="chat"><i>💬</i><span>Центр связи</span></div>

            <div class="nav-label">Система</div>
            <div class="nav-link" data-target="profile"><i>👤</i><span>Профиль</span></div>
            <div class="nav-link" data-target="settings"><i>⚙️</i><span>Настройки</span></div>
        </div>
        <div style="padding:18px">
            <div class="nav-link" style="color:var(--accent)" id="logoutBtn"><i>🚪</i><span>Завершить сессию</span></div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="stage" id="main-stage" style="display:none">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:12px">
                <button id="menuToggle" class="btn btn-outline" style="display:none">☰</button>
                <div class="search-box">
                    <span>🔍</span><input placeholder="Поиск по реестру подарков..." id="searchInput">
                </div>
            </div>

            <div style="display:flex;align-items:center;gap:12px">
                <div style="display:flex;align-items:center;gap:12px" class="user-actions">
                    <div class="notif-bell" title="Уведомления">🔔<div class="notif-dot"></div></div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div style="text-align:right">
                            <div style="font-size:13px;font-weight:600" id="userName">Santa Claus</div>
                            <div style="font-size:11px;color:var(--success)" id="userRole">Chief Executive</div>
                        </div>
                        <img src="https://img.icons8.com/color/48/santa.png" width="38" style="border-radius:8px">
                    </div>
                </div>
            </div>
        </header>

        <main class="content-scroll" id="content">
            <!-- injected by JS -->
        </main>

        <footer style="padding:12px 26px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(0,0,0,0.12)">
            <div class="player" id="player">
                <div id="vinyl" class="vinyl">♪</div>
                <div style="display:flex;flex-direction:column">
                    <div style="font-size:13px">Now playing</div>
                    <div style="font-size:12px;color:var(--text-dim)" id="trackTitle">—</div>
                </div>
                <div style="margin-left:12px;display:flex;gap:8px;align-items:center">
                    <button class="btn btn-outline" id="p-btn" onclick="playPause()"><i id="p-icon">▶</i></button>
                </div>
            </div>

            <div style="font-size:13px;color:var(--text-dim)">© Santa Global Tech — <span id="ny-days">0</span> дней до Нового Года</div>
        </footer>
    </div>

    <script>
        // ----------------------------
        // Простые данные и state
        // ----------------------------
        const repoName = 'santa-workshop';
        let session = null;
        let users = JSON.parse(localStorage.getItem('s_users') || '[]');
        let msgs = JSON.parse(localStorage.getItem('s_msgs') || '[]');
        let news = JSON.parse(localStorage.getItem('s_news') || '[]');

        // seed demo data if empty
        if(!users.length){
            users = [
                {id:1,name:'Santa',avatar:'https://img.icons8.com/color/48/santa.png'},
                {id:2,name:'Rudolf',avatar:'https://img.icons8.com/color/48/reindeer.png'}
            ];
            localStorage.setItem('s_users', JSON.stringify(users));
        }
        if(!news.length){
            news = [
                {t:'SYSTEM', c:'Обновление нод 14.05.2026 — успешно.'},
                {t:'OPS', c:'Новая партия подарков загружена в цех №3.'}
            ];
            localStorage.setItem('s_news', JSON.stringify(news));
        }

        // ----------------------------
        // UI templates
        // ----------------------------
        const UI = {
            dash: () => `
                <h1 style="margin-bottom:8px">Глобальный мониторинг</h1>
                <p style="color:var(--text-dim);margin-bottom:18px">Обзор активности Северного Полюса</p>
                <div class="grid-stats">
                    <div class="stat-card">
                        <div class="stat-label">🟢 Выполнено заказов</div>
                        <div class="stat-val">842,903</div>
                        <div style="font-size:12px;color:var(--success)">+12% за эту неделю</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">⏳ В обработке</div>
                        <div class="stat-val">128,440</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:65%"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">❄️ Магический фон</div>
                        <div class="stat-val">9.81 mS</div>
                        <div style="font-size:12px;color:var(--gold)">Стабильно (High Energy)</div>
                    </div>
                </div>

                <div class="stat-card" style="margin-bottom:16px">
                    <h3>Новости</h3>
                    <div id="news-feed" style="margin-top:12px"></div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start">
                    <div class="stat-card">
                        <h3>Активность цехов</h3>
                        <div style="margin-top:16px;height:140px;display:flex;align-items:flex-end;gap:8px">
                            <div style="flex:1;background:var(--accent);height:40%;border-radius:5px"></div>
                            <div style="flex:1;background:var(--accent);height:70%;border-radius:5px"></div>
                            <div style="flex:1;background:var(--accent);height:90%;border-radius:5px"></div>
                            <div style="flex:1;background:var(--accent);height:55%;border-radius:5px"></div>
                            <div style="flex:1;background:var(--accent);height:85%;border-radius:5px"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <h3>Статистика</h3>
                        <div style="margin-top:12px;font-size:13px;color:var(--text-dim)"><b>Пользователи:</b> <span id="s-users">0</span></div>
                        <div style="margin-top:8px;font-size:13px;color:var(--text-dim)"><b>Сообщения:</b> <span id="s-chat">0</span></div>
                        <div style="margin-top:12px">
                            <button class="btn btn-primary" onclick="openSection('chat')">Открыть чат</button>
                        </div>
                    </div>
                </div>
            `,
            profile: () => `
                <div class="profile-hero">
                    <div class="avatar"></div>
                    <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
                            <span class="profile-badge">PRO LEVEL</span>
                            <h2 style="margin:0">Santa Claus</h2>
                        </div>
                        <p style="color:var(--text-dim);margin-bottom:12px">Генеральный директор Santa Global Tech. Архитектор праздничных систем.</p>
                        <div style="display:flex;gap:10px">
                            <button class="btn btn-primary">Редактировать профиль</button>
                            <button class="btn btn-outline">Настройки</button>
                        </div>
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px">
                    <div class="stat-card">
                        <h3>Профессиональные навыки</h3>
                        <div style="margin-top:12px">
                            <div style="display:flex;justify-content:space-between;font-size:13px"><span>Логистика оленей</span><span>95%</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width:95%"></div></div>

                            <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:12px"><span>Магия Рождества</span><span>100%</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width:100%;background:var(--gold)"></div></div>

                            <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:12px"><span>Управление эльфами</span><span>88%</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width:88%;background:var(--success)"></div></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <h3>Связанные аккаунты</h3>
                        <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">
                            <div style="padding:10px;border:1px solid var(--border);border-radius:10px">Telegram: @santa_official</div>
                            <div style="padding:10px;border:1px solid var(--border);border-radius:10px">Email: office@northpole.com</div>
                        </div>
                    </div>
                </div>
            `,
            chat: () => `
                <h2>Центр связи</h2>
                <div class="stat-card chat-window">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input">
                        <input id="chat-text" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter'){sendMsg()}">
                        <button class="btn btn-primary" onclick="sendMsg()">Отправить</button>
                    </div>
                </div>
            `,
            elves: () => `
                <h2>Эльфы-соискатели</h2>
                <div class="grid-stats">
                    <div class="stat-card">
                        <div class="stat-label">🧝 Активных эльфов</div>
                        <div class="stat-val">5,342</div>
                        <div style="font-size:12px;color:var(--text-dim)">Обычно: 4k—6k</div>
                    </div>
                    <div class="stat-card">
                        <h3>Последние приёмы</h3>
                        <div style="margin-top:10px">
                            <div style="padding:8px;border-bottom:1px dashed var(--border)">Набор в офис логистики — 12.05.2026</div>
                            <div style="padding:8px;border-bottom:1px dashed var(--border)">Мастер по упаковке — 05.05.2026</div>
                        </div>
                    </div>
                </div>
            `,
            factory: () => `
                <h2>Производство</h2>
                <div class="stat-card">
                    <h3>Цехи</h3>
                    <div style="display:flex;gap:10px;margin-top:12px">
                        <div style="flex:1;padding:12px;border:1px solid var(--border);border-radius:10px">Цех #1 — В процессе</div>
                        <div style="flex:1;padding:12px;border:1px solid var(--border);border-radius:10px">Цех #2 — Ожидает</div>
                        <div style="flex:1;padding:12px;border:1px solid var(--border);border-radius:10px">Цех #3 — Загружен</div>
                    </div>
                </div>
            `,
            settings: () => `
                <h2>Настройки</h2>
                <div class="stat-card">
                    <div style="display:flex;flex-direction:column;gap:12px">
                        <label style="font-size:13px;color:var(--text-dim)">Тема: <select id="themeSelect"><option value="dark">Dark</option></select></label>
                        <label style="font-size:13px;color:var(--text-dim)"><input type="checkbox" id="autoPlayMusic"> Включить музыку при входе</label>
                    </div>
                </div>
            `
        };

        // ----------------------------
        // Audio player
        // ----------------------------
        let audio = new Audio();
        // sample track (public) — поменяйте на свой
        audio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
        audio.loop = true;
        let playing = false;
        let curTrackTitle = 'SoundHelix Sample';

        document.getElementById && document.addEventListener && (() => {
            // set title in footer
            const tt = document.getElementById('trackTitle');
            if(tt) tt.innerText = curTrackTitle;
        })();

        function playPause(){
            if(!audio) return;
            if(playing){
                audio.pause();
            } else {
                const p = audio.play();
                if(p !== undefined){
                    p.then(()=>{}).catch(err=>{
                        console.log('Playback blocked. User gesture required.', err);
                        toast('Воспроизведение заблокировано. Нажмите PLAY ещё раз.');
                    });
                }
            }
            playing = !playing;
            const btn = document.getElementById('p-icon');
            if(btn) btn.innerText = playing ? '⏸' : '▶';
            const v = document.getElementById('vinyl');
            v && v.classList.toggle('playing', playing);
        }

        function loadTrack(src, title){
            audio.src = src;
            curTrackTitle = title || src;
            document.getElementById('trackTitle').innerText = curTrackTitle;
            if(playing) {
                audio.play().catch(()=>{});
            }
        }

        // ----------------------------
        // Utils
        // ----------------------------
        function toast(msg){
            console.log('TOAST:', msg);
            // quick ephemeral on-screen toast
            const t = document.createElement('div');
            t.innerText = msg;
            t.style.position = 'fixed';
            t.style.left = '50%';
            t.style.bottom = '24px';
            t.style.transform = 'translateX(-50%)';
            t.style.background = 'rgba(0,0,0,0.7)';
            t.style.color = '#fff';
            t.style.padding = '10px 14px';
            t.style.borderRadius = '10px';
            t.style.zIndex = 3000;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(), 3500);
        }

        // ----------------------------
        // Home/dashboard render
        // ----------------------------
        function renderHome(){
            // days until next Jan 1
            const now = new Date();
            const year = now.getFullYear();
            const target = new Date(year + 1, 0, 1, 0, 0, 0); // next Jan 1
            const diff = Math.max(0, Math.ceil((target - now) / (1000*60*60*24)));
            const daysEl = document.getElementById('ny-days');
            if(daysEl) daysEl.innerText = diff;

            // stats
            const su = document.getElementById('s-users');
            const sc = document.getElementById('s-chat');
            if(su) su.innerText = users.length;
            if(sc) sc.innerText = msgs.length;

            // news feed
            const nf = document.getElementById('news-feed');
            if(nf){
                // if current session user is 'Santa', add hidden status message
                const display = [...news];
                if(session && session.user && session.user.toLowerCase().includes('santa')){
                    display.unshift({t:'NEXUS STATUS', c:'Протокол Автономия: Активен. Проверено 142 сервера.'});
                }
                nf.innerHTML = display.map(n => `
                    <div style="border-bottom:1px solid var(--border);padding:10px 0;">
                        <b style="color:var(--gold);font-size:13px">${n.t}</b><br>
                        <span style="font-size:12px;color:var(--text-dim)">${n.c}</span>
                    </div>
                `).join('');
            }
        }

        // ----------------------------
        // Chat
        // ----------------------------
        function renderChat(){
            const b = document.getElementById('chat-messages');
            if(!b) return;
            b.innerHTML = msgs.map(m => `
                <div class="chat-msg">
                    <img src="${m.a}" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--gold)">
                    <div style="background:var(--panel);border:1px solid var(--border);padding:10px;border-radius:14px;max-width:720px">
                        <div style="display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--gold);font-weight:700">
                            <span>${m.u}</span><span style="color:var(--text-dim);font-weight:400">${m.time}</span>
                        </div>
                        <div style="margin-top:6px;font-size:14px;color:var(--text-main);line-height:1.3">${escapeHtml(m.t)}</div>
                    </div>
                </div>
            `).join('');
            // auto scroll to bottom
            setTimeout(()=>{ b.scrollTop = b.scrollHeight; }, 80);
        }

        function escapeHtml(text){
            if(!text) return '';
            return text.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
        }

        function sendMsg(){
            const input = document.getElementById('chat-text');
            if(!input) return;
            const text = input.value.trim();
            if(!text) return;
            const u = session ? session.user : 'Guest';
            const now = new Date();
            const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const avatar = session && session.avatar ? session.avatar : 'https://img.icons8.com/color/48/santa.png';
            msgs.push({u, a: avatar, t: text, time});
            localStorage.setItem('s_msgs', JSON.stringify(msgs));
            input.value = '';
            renderChat();
            updateHeader();
        }

        // ----------------------------
        // Navigation
        // ----------------------------
        function mountPage(page){
            const content = document.getElementById('content');
            if(!content) return;
            if(!UI[page]) content.innerHTML = `<h2>Раздел ${page}</h2><div class="stat-card">Модуль в разработке</div>`;
            else content.innerHTML = UI[page]();

            // special hooks
            if(page === 'dash') renderHome();
            if(page === 'chat') renderChat();
            if(page === 'settings'){
                const ap = document.getElementById('autoPlayMusic');
                if(ap) ap.checked = localStorage.getItem('autoPlay') === '1';
                ap && ap.addEventListener('change', (ev) => {
                    localStorage.setItem('autoPlay', ev.target.checked ? '1' : '0');
                });
            }

            // update nav visuals
            document.querySelectorAll('.nav-link').forEach(n => {
                n.classList.toggle('active', n.dataset.target === page);
            });
        }

        function openSection(target){
            // map friendly names to page keys
            const pages = ['dash','factory','elves','chat','profile','settings'];
            if(pages.includes(target)) mountPage(target);
            else mountPage('dash');
            // ensure main-stage visible
            document.getElementById('main-stage').style.display = 'flex';
        }

        // ----------------------------
        // Login
        // ----------------------------
        function login(){
            const pass = document.getElementById('pass').value;
            if(pass === 'admin'){
                session = {user:'Santa', avatar:'https://img.icons8.com/color/48/santa.png', role:'Chief Executive'};
                localStorage.setItem('s_session', JSON.stringify(session));
                afterLogin();
            } else {
                alert('Ключ отклонен.');
            }
        }
        function demoLogin(){
            session = {user:'Demo User', avatar:'https://img.icons8.com/color/48/reindeer.png', role:'Operator'};
            localStorage.setItem('s_session', JSON.stringify(session));
            afterLogin();
        }
        function afterLogin(){
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-stage').style.display = 'flex';
            document.getElementById('userName').innerText = session.user;
            document.getElementById('userRole').innerText = session.role || '';
            // auto open dash
            mountPage('dash');
            // optionally autoplay music
            if(localStorage.getItem('autoPlay') === '1'){
                playPause();
            }
            updateHeader();
        }

        function logout(){
            localStorage.removeItem('s_session');
            session = null;
            // show login
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-stage').style.display = 'none';
        }

        // ----------------------------
        // Header/controls
        // ----------------------------
        function updateHeader(){
            // refresh counts
            const su = document.getElementById('s-users');
            const sc = document.getElementById('s-chat');
            if(su) su.innerText = users.length;
            if(sc) sc.innerText = msgs.length;
        }

        // ----------------------------
        // Snow canvas (optimized)
        // ----------------------------
        (function snowModule(){
            const canvas = document.getElementById('snow');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let w = innerWidth, h = innerHeight;
            let flakes = [];
            function reset(){
                w = canvas.width = innerWidth;
                h = canvas.height = innerHeight;
                flakes = Array.from({length: Math.round(Math.max(40, w/20))}, () => ({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+0.6,s:Math.random()*0.8+0.2}));
            }
            function draw(){
                ctx.clearRect(0,0,w,h);
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                flakes.forEach(f => {
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
                    f.y += f.s;
                    f.x += Math.sin(f.y * 0.01) * 0.5;
                    if(f.y > h) { f.y = -10; f.x = Math.random()*w; }
                });
                ctx.fill();
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', reset);
            reset(); draw();
        })();

        // ----------------------------
        // Header lights init
        // ----------------------------
        (function lightsInit(){
            const colors = ['#e63946','#f1faee','#a8dadc','#457b9d','#ffb703'];
            const container = document.getElementById('lights');
            for(let i=0;i<60;i++){
                const d = document.createElement('div');
                d.className = 'light-seg';
                d.style.background = colors[i % colors.length];
                d.style.animationDelay = (i * 0.05) + 's';
                container.appendChild(d);
            }
        })();

        // ----------------------------
        // Nav click handling
        // ----------------------------
        document.addEventListener('click', (ev) => {
            const t = ev.target.closest && ev.target.closest('.nav-link');
            if(t && t.dataset && t.dataset.target){
                mountPage(t.dataset.target);
            }
            if(ev.target.id === 'logoutBtn' || ev.target.closest('#logoutBtn')){
                logout();
            }
        });

        // small-screen menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        function setupResponsive(){
            function apply(){
                if(window.innerWidth <= 900){
                    menuToggle.style.display = 'inline-flex';
                    menuToggle.onclick = () => {
                        const open = sidebar.classList.toggle('open');
                        document.body.classList.toggle('showing-sidebar', open);
                    };
                } else {
                    menuToggle.style.display = 'none';
                    sidebar.classList.remove('open');
                    document.body.classList.remove('showing-sidebar');
                }
            }
            apply();
            window.addEventListener('resize', apply);
        }

        // ----------------------------
        // Helpers on load
        // ----------------------------
        function initFromStorage(){
            const s = localStorage.getItem('s_session');
            if(s){
                try{ session = JSON.parse(s); }catch(e){session=null;}
            }
            const auto = localStorage.getItem('autoPlay');
            if(auto === null) localStorage.setItem('autoPlay', '0');
        }

        // quick mount
        window.addEventListener('DOMContentLoaded', () => {
            initFromStorage();
            setupResponsive();

            // if session exists, show main
            if(session){
                afterLogin();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-stage').style.display = 'none';
            }

            // initialize player UI
            const v = document.getElementById('vinyl');
            if(v) v.classList.toggle('playing', playing);
            document.getElementById('p-icon').innerText = playing ? '⏸' : '▶';

            // if on dash, render home
            renderHome();
            updateHeader();
        });

        // expose some functions to console for quick testing
        window.loadTrack = loadTrack;
        window.playPause = playPause;
        window.sendMsg = sendMsg;
        window.openSection = openSection;
        window.renderChat = renderChat;
        window.renderHome = renderHome;
    </script>
</body>
</html>
