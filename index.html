<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Santa Workshop v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030308;
            --surface: rgba(14, 14, 30, 0.8);
            --card: rgba(25, 25, 45, 0.6);
            --gold: #f1c40f;
            --red: #ff4757;
            --accent: #00d2ff;
            --text: #ffffff;
            --text-dim: #a0a0b8;
            --glass: blur(12px);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1a1a3a, #030308);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header {
            background: var(--surface);
            backdrop-filter: var(--glass);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .logo span { color: var(--red); text-shadow: 0 0 10px rgba(255,71,87,0.5); }

        /* Content Area */
        .content { flex: 1; padding: 20px 15px; padding-bottom: 140px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Cards */
        .card { 
            background: var(--card); 
            backdrop-filter: var(--glass);
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            background: rgba(10, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            z-index: 1000;
            padding: 10px 5px;
            justify-content: space-around;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            background: none; border: none; color: var(--text-dim);
            font-size: 10px; font-weight: 500; cursor: pointer;
            transition: 0.3s; width: 60px;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--red); }

        /* Music Player Interface */
        .music-player {
            position: fixed;
            bottom: 75px;
            width: calc(100% - 30px);
            max-width: 450px;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(15px);
            margin: 0 15px;
            border-radius: 25px;
            padding: 12px 20px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 900;
        }
        .track-art { 
            width: 45px; height: 45px; background: linear-gradient(45deg, var(--gold), var(--red));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; animation: rotate 5s linear infinite; animation-play-state: paused;
        }
        .track-art.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-info { flex: 1; overflow: hidden; }
        .track-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 10px; color: var(--text-dim); }

        .player-btns { display: flex; gap: 12px; align-items: center; }
        .btn-play { background: var(--red); width: 36px; height: 36px; border-radius: 50%; border: none; color: white; cursor: pointer; }

        /* New Auth/Reg Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .auth-card {
            background: var(--surface); width: 100%; max-width: 360px;
            border-radius: 30px; border: 1px solid var(--border); padding: 35px 25px;
            position: relative; overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: var(--red); opacity: 0.1; border-radius: 50%;
        }

        .auth-card h2 { margin-bottom: 25px; font-size: 24px; font-weight: 800; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: var(--text-dim); }
        .input-group input { 
            width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 14px;
        }
        .btn-action {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--red); color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-action:active { transform: scale(0.95); }

        /* NY Box */
        .ny-counter {
            background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(231,76,60,0.2));
            border: 2px solid var(--gold); border-radius: 25px; padding: 25px; text-align: center;
        }
        .ny-val { font-size: 54px; font-weight: 900; color: var(--gold); line-height: 1; }

        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            padding: 12px 25px; border-radius: 100px; font-size: 13px; font-weight: 600;
            z-index: 3000; animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 30px; } }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .stat-item i { color: var(--gold); margin-bottom: 8px; font-size: 18px; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="logo" onclick="showPage('home')">SANTA<span>.WS</span></div>
        <div id="user-header"></div>
    </header>

    <div class="content">
        <!-- HOME PAGE -->
        <div class="page active" id="page-home">
            <div class="ny-counter">
                <div class="ny-val" id="ny-days">0</div>
                <div style="text-transform:uppercase; font-size:10px; font-weight:800; letter-spacing:2px; margin-top:5px;">Дней до Нового Года</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fa-solid fa-bolt"></i>
                    <div id="stat-online" style="font-size:18px; font-weight:800;">1</div>
                    <div style="font-size:9px; color:var(--text-dim);">ОНЛАЙН</div>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-users"></i>
                    <div id="stat-users" style="font-size:18px; font-weight:800;">0</div>
                    <div style="font-size:9px; color:var(--text-dim);">ЭЛЬФОВ</div>
                </div>
            </div>

            <div class="card">
                <h4 style="margin-bottom:12px;"><i class="fa-solid fa-newspaper" style="color:var(--red);"></i> Новости</h4>
                <div id="news-list"></div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div class="page" id="page-chat">
            <div class="card" style="padding:10px;">
                <div id="chat-box" style="height:400px; overflow-y:auto; padding-right:5px; margin-bottom:15px;"></div>
                <form onsubmit="handleChat(event)" style="display:flex; gap:10px;">
                    <input type="text" id="chat-in" placeholder="Напиши что-нибудь..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:12px; color:white;">
                    <button class="btn-play" style="flex-shrink:0;"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>

        <!-- PROFILE PAGE -->
        <div class="page" id="page-profile">
            <div class="card" style="text-align:center;">
                <div style="position:relative; width:80px; height:80px; margin: 0 auto 15px;">
                    <img id="u-ava" src="" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--gold);">
                </div>
                <h2 id="u-name"></h2>
                <div id="u-badge" style="margin:5px 0;"></div>
                <p id="u-status" style="color:var(--text-dim); font-size:12px;"></p>
            </div>
            
            <div class="card">
                <h4 style="margin-bottom:15px;">Настройки</h4>
                <input type="text" id="set-name" placeholder="Имя">
                <input type="text" id="set-status" placeholder="Статус">
                <input type="text" id="set-ava" placeholder="Ссылка на аватар">
                <button class="btn-action" onclick="updateProfile()">Сохранить изменения</button>
                <button class="btn-action" style="background:transparent; color:var(--red); border:1px solid var(--red); margin-top:10px;" onclick="logout()">Выйти из системы</button>
            </div>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-player">
        <div class="track-art" id="player-art"><i class="fa-solid fa-compact-disc"></i></div>
        <div class="player-info">
            <div class="track-name" id="player-title">Загрузка...</div>
            <div class="track-artist" id="player-artist">Classic 60s Collection</div>
        </div>
        <div class="player-btns">
            <i class="fa-solid fa-backward-step" onclick="prevSong()" style="cursor:pointer;"></i>
            <button class="btn-play" onclick="togglePlay()" id="play-icon"><i class="fa-solid fa-play"></i></button>
            <i class="fa-solid fa-forward-step" onclick="nextSong()" style="cursor:pointer;"></i>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('home')"><i class="fa-solid fa-house"></i>Дом</button>
        <button class="nav-item" onclick="showPage('chat')"><i class="fa-solid fa-comment-dots"></i>Чат</button>
        <button class="nav-item" onclick="showPage('forum')"><i class="fa-solid fa-folder-tree"></i>Темы</button>
        <button class="nav-item" onclick="showPage('profile')" id="nav-prof"><i class="fa-solid fa-user-gear"></i>Профиль</button>
    </nav>
</div>

<!-- Modal Auth -->
<div class="modal-overlay" id="auth-modal">
    <div class="auth-card">
        <h2 id="auth-title">С возвращением!</h2>
        <div id="auth-form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="a-user" placeholder="Ваше имя">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="a-pass" placeholder="Пароль">
            </div>
            <div id="reg-fields" style="display:none;">
                <div class="input-group">
                    <i class="fa-solid fa-quote-left"></i>
                    <input type="text" id="a-status" placeholder="Статус эльфа">
                </div>
            </div>
            <button class="btn-action" id="a-btn" onclick="processAuth()">Войти</button>
            <p id="a-switch" style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-dim); cursor:pointer;" onclick="switchAuth()">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>
</div>

<script>
// --- Плейлист 60-х (25 треков) ---
const PLAYLIST = [
    { t: "It's the Most Wonderful Time", a: "Andy Williams (1963)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { t: "Rockin' Around the Christmas Tree", a: "Brenda Lee (1958)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { t: "A Holly Jolly Christmas", a: "Burl Ives (1964)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { t: "White Christmas", a: "Dean Martin (1966)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    { t: "Jingle Bell Rock", a: "Bobby Helms (1957)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
    { t: "The Christmas Song", a: "Nat King Cole (1961)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" },
    { t: "Rudolph the Red-Nosed Reindeer", a: "The Temptations (1968)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3" },
    { t: "Blue Christmas", a: "Elvis Presley (1964)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" },
    { t: "Sleigh Ride", a: "The Ronettes (1963)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3" },
    { t: "Santa Claus Is Coming To Town", a: "Frank Sinatra (1967)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" },
    { t: "Little Saint Nick", a: "The Beach Boys (1963)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3" },
    { t: "Baby It's Cold Outside", a: "Ray Charles (1966)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3" },
    { t: "Christmas (Baby Please Come Home)", a: "Darlene Love (1963)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3" },
    { t: "Feliz Navidad", a: "José Feliciano (1970)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3" },
    { t: "Santa Baby", a: "Eartha Kitt (1953)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" },
    { t: "Run Rudolph Run", a: "Chuck Berry (1958)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" },
    { t: "Let It Snow!", a: "Frank Sinatra (1950)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { t: "Winter Wonderland", a: "Tony Bennett (1968)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { t: "Silver Bells", a: "Bing Crosby (1950)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { t: "Deck The Halls", a: "The Everly Brothers (1962)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    { t: "Frosty The Snowman", a: "Gene Autry (1950)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
    { t: "I'll Be Home For Christmas", a: "Elvis Presley (1957)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" },
    { t: "Have Yourself A Merry Christmas", a: "Ella Fitzgerald (1960)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3" },
    { t: "Wonderful Christmastime", a: "Paul McCartney (1979)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" },
    { t: "Do They Know It's Christmas?", a: "Band Aid (1984)", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3" }
];

let songIdx = 0, isPlaying = false, audio = new Audio();
let isRegMode = false;

const Storage = {
    save: (k,v) => localStorage.setItem('santa_'+k, JSON.stringify(v)),
    load: (k,d) => JSON.parse(localStorage.getItem('santa_'+k)) || d
};

let users = Storage.load('users', [{ id:1, user:'Santa', pass:'admin', role:'dev', ava:'https://i.pravatar.cc/150?u=santa', status:'🎅 Создатель', banned:false }]);
let messages = Storage.load('chat', []);
let news = Storage.load('news', [{ title: 'Добро пожаловать!', text: 'Система обновлена до v2.0', date: '15.05.2026' }]);
let session = Storage.load('session', null);

// --- Музыкальный движок ---
function loadSong(idx) {
    const s = PLAYLIST[idx];
    audio.src = s.src;
    document.getElementById('player-title').innerText = s.t;
    document.getElementById('player-artist').innerText = s.a;
}
function togglePlay() {
    if(isPlaying) { audio.pause(); } else { audio.play().catch(()=>{}); }
    isPlaying = !isPlaying;
    document.getElementById('play-icon').innerHTML = isPlaying ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
    document.getElementById('player-art').classList.toggle('playing', isPlaying);
}
function nextSong() { songIdx = (songIdx+1)%PLAYLIST.length; loadSong(songIdx); if(isPlaying) audio.play(); }
function prevSong() { songIdx = (songIdx-1+PLAYLIST.length)%PLAYLIST.length; loadSong(songIdx); if(isPlaying) audio.play(); }

// --- Авторизация ---
function switchAuth() {
    isRegMode = !isRegMode;
    document.getElementById('auth-title').innerText = isRegMode ? 'Новый эльф' : 'С возвращением!';
    document.getElementById('reg-fields').style.display = isRegMode ? 'block' : 'none';
    document.getElementById('a-btn').innerText = isRegMode ? 'Создать аккаунт' : 'Войти';
    document.getElementById('a-switch').innerText = isRegMode ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
}

function processAuth() {
    const u = document.getElementById('a-user').value.trim();
    const p = document.getElementById('a-pass').value;
    
    if(isRegMode) {
        if(u.length < 3) return toast('Имя слишком короткое');
        if(users.find(x => x.user === u)) return toast('Это имя уже занято');
        const newUser = { id: Date.now(), user: u, pass: p, role: 'user', ava: `https://api.dicebear.com/7.x/avataaars/svg?seed=${u}`, status: document.getElementById('a-status').value || 'Новый эльф', banned: false };
        users.push(newUser);
        Storage.save('users', users);
        toast('Аккаунт создан! Теперь войдите.');
        switchAuth();
    } else {
        const found = users.find(x => x.user === u && x.pass === p);
        if(!found) return toast('Неверный логин или пароль');
        session = found;
        Storage.save('session', session);
        document.getElementById('auth-modal').classList.remove('active');
        updateUI();
        toast('С возвращением, ' + u);
    }
}

// --- Интерфейс ---
function showPage(id) {
    if(id === 'profile' && !session) return document.getElementById('auth-modal').classList.add('active');
    
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if(id === 'home') renderHome();
    if(id === 'chat') renderChat();
    if(id === 'profile') renderProfile();
}

function renderHome() {
    const diff = new Date(new Date().getFullYear() + 1, 0, 1) - new Date();
    document.getElementById('ny-days').innerText = Math.ceil(diff/86400000);
    document.getElementById('stat-users').innerText = users.length;
    document.getElementById('news-list').innerHTML = news.map(n => `<div style="border-left:2px solid var(--red); padding-left:10px; margin-bottom:15px;"><div style="font-size:12px; font-weight:700;">${n.title}</div><div style="font-size:10px; color:var(--text-dim);">${n.text}</div></div>`).join('');
}

function renderChat() {
    const box = document.getElementById('chat-box');
    box.innerHTML = messages.map(m => `
        <div style="margin-bottom:12px; display:flex; gap:10px; align-items:flex-start;">
            <img src="${m.ava}" style="width:30px; height:30px; border-radius:8px;">
            <div>
                <div style="font-size:10px; font-weight:700; color:var(--gold);">${m.user} <span style="font-weight:400; color:var(--text-dim); margin-left:5px;">${m.time}</span></div>
                <div style="font-size:12px; background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:0 12px 12px 12px; margin-top:3px;">${m.text}</div>
            </div>
        </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

function handleChat(e) {
    e.preventDefault();
    if(!session) return toast('Сначала войдите');
    const inp = document.getElementById('chat-in');
    if(!inp.value.trim()) return;
    messages.push({ user: session.user, ava: session.ava, text: inp.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
    if(messages.length > 50) messages.shift();
    Storage.save('chat', messages);
    inp.value = '';
    renderChat();
}

function renderProfile() {
    document.getElementById('u-ava').src = session.ava;
    document.getElementById('u-name').innerText = session.user;
    document.getElementById('u-status').innerText = session.status;
    document.getElementById('u-badge').innerHTML = `<span style="background:var(--red); padding:3px 10px; border-radius:50px; font-size:10px; font-weight:800; text-transform:uppercase;">${session.role}</span>`;
    document.getElementById('set-name').value = session.user;
    document.getElementById('set-status').value = session.status;
    document.getElementById('set-ava').value = session.ava;
}

function updateProfile() {
    session.user = document.getElementById('set-name').value;
    session.status = document.getElementById('set-status').value;
    session.ava = document.getElementById('set-ava').value;
    const idx = users.findIndex(x => x.id === session.id);
    users[idx] = session;
    Storage.save('users', users);
    Storage.save('session', session);
    toast('Профиль обновлен!');
    updateUI();
}

function logout() {
    session = null;
    Storage.save('session', null);
    updateUI();
    showPage('home');
}

function updateUI() {
    const head = document.getElementById('user-header');
    if(session) {
        head.innerHTML = `<img src="${session.ava}" style="width:32px; height:32px; border-radius:50%; border:1px solid var(--gold);" onclick="showPage('profile')">`;
    } else {
        head.innerHTML = `<button onclick="document.getElementById('auth-modal').classList.add('active')" style="background:none; border:none; color:var(--red); font-weight:800; font-size:12px;">ВХОД</button>`;
    }
}

function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.background = 'var(--surface)';
    t.style.border = '1px solid var(--border)';
    t.style.backdropFilter = 'blur(10px)';
    t.style.color = 'white';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// Init
loadSong(0);
updateUI();
renderHome();
audio.addEventListener('ended', nextSong);
</script>

</body>
</html>
