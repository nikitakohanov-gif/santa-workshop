<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANTA WORKSHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a1628; --surface: rgba(20,35,60,0.85);
            --ice: #c8e6f5; --gold: #d4a843; --red: #c0392b;
            --text: #e8f0f8; --text2: #8a9bb5; --border: rgba(200,230,245,0.2);
            --radius: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
        .app { max-width:500px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; }
        
        .header { padding:12px 16px; background:rgba(15,28,50,0.95); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:900; letter-spacing:2px; color:var(--ice); }
        .logo span { color:var(--gold); }
        .user-ava { width:34px; height:34px; border-radius:50%; border:2px solid var(--ice); cursor:pointer; object-fit:cover; }

        .content { flex:1; overflow-y:auto; padding:12px; padding-bottom:120px; }
        .page { display:none; }
        .page.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:8px; }
        .card-gold { border-color:var(--gold); }

        .btn { display:inline-block; padding:10px 16px; border:1px solid var(--ice); background:transparent; color:var(--ice); font-family:'Montserrat',sans-serif; font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; transition:all 0.3s; text-align:center; width:100%; border-radius:6px; }
        .btn:hover { background:var(--ice); color:#0a1628; }
        .btn-fill { background:var(--ice); color:#0a1628; }
        .btn-gold { border-color:var(--gold); color:var(--gold); }
        .btn-sm { padding:6px 10px; font-size:8px; width:auto; }
        .btn-xs { padding:4px 8px; font-size:7px; width:auto; }

        input,textarea { width:100%; padding:10px; margin-bottom:6px; background:rgba(10,22,40,0.8); border:1px solid var(--border); color:var(--text); font-family:'Montserrat',sans-serif; font-size:10px; border-radius:6px; }
        input:focus,textarea:focus { outline:none; border-color:var(--ice); }
        textarea { resize:vertical; min-height:50px; }

        .badge { display:inline-block; padding:2px 6px; border:1px solid var(--ice); font-size:7px; text-transform:uppercase; letter-spacing:1px; color:var(--ice); border-radius:4px; }
        .badge-gold { border-color:var(--gold); color:var(--gold); }

        .nav-bar { position:fixed; bottom:0; width:100%; max-width:500px; background:rgba(15,28,50,0.98); border-top:1px solid var(--border); display:flex; overflow-x:auto; padding:6px 2px; }
        .nav-btn { flex-shrink:0; background:none; border:none; color:var(--text2); font-family:'Montserrat',sans-serif; font-size:8px; font-weight:600; text-transform:uppercase; letter-spacing:1px; cursor:pointer; padding:6px 8px; transition:all 0.3s; }
        .nav-btn.active { color:var(--ice); }

        .modal { position:fixed; inset:0; background:rgba(5,12,25,0.95); z-index:2000; display:none; align-items:center; justify-content:center; padding:16px; }
        .modal.active { display:flex; }
        .modal-box { background:var(--surface); border:1px solid var(--ice); padding:24px 18px; width:100%; max-width:340px; text-align:center; border-radius:var(--radius); }

        .shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .shop-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px; text-align:center; cursor:pointer; transition:all 0.3s; }
        .shop-item:hover { border-color:var(--gold); }
        .shop-item .emoji { font-size:28px; }

        .game-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; cursor:pointer; transition:all 0.3s; }
        .game-box:hover { border-color:var(--gold); }

        .chat-msg { padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:10px; }
        .chat-author { font-weight:700; font-size:9px; }

        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); padding:8px 16px; border:1px solid var(--ice); background:rgba(15,28,50,0.95); color:var(--ice); font-size:9px; z-index:3000; letter-spacing:1px; text-transform:uppercase; border-radius:6px; }

        .smile-panel { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
        .smile-panel span { cursor:pointer; font-size:18px; padding:4px; border-radius:4px; transition:all 0.2s; }
        .smile-panel span:hover { background:rgba(200,230,245,0.15); }

        ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:var(--ice); border-radius:2px; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="logo" onclick="showPage('home')">SANTA<span>WS</span></div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;color:var(--ice);" id="coin-display">❄0</span>
            <img class="user-ava" id="user-avatar-top" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎅</text></svg>" onclick="showPage('profile')">
        </div>
    </header>

    <div class="content" id="main-content"></div>

    <nav class="nav-bar" id="nav-bar"></nav>
</div>

<div class="modal" id="modal-container"></div>

<script>
// ===== DB =====
const DB = {
    get(k,d){ try{return JSON.parse(localStorage.getItem('sw_'+k))||d;}catch(e){return d;} },
    set(k,v){ localStorage.setItem('sw_'+k,JSON.stringify(v)); }
};

// ===== STATE =====
let session = DB.get('session', null);
let users = DB.get('users', [
    { id:1, username:'Santa', password:'admin', role:'dev', avatar:'https://i.pravatar.cc/150?u=santa', status:'ДИРЕКТОР', nick_color:'#c8e6f5', banned:false, coins:9999, inventory:['🎅','👑','💎'], friends:[], friendRequests:[] }
]);
let messages = DB.get('chat', []);
let topics = DB.get('topics', []);
let news = DB.get('news', [
    { title:'МАСТЕРСКАЯ ОТКРЫТА', text:'Добро пожаловать! Магазин, игры, друзья — всё работает.' },
    { title:'МАГАЗИН', text:'Покупайте смайлы для чата, рамки для аватара и украшения профиля.' },
    { title:'МИНИ-ИГРЫ', text:'Играйте в кости и угадайку, зарабатывайте снежинки!' },
]);
let shop = DB.get('shop', [
    { id:1, name:'Смайл-пак Зима', emoji:'❄️', price:50, type:'emoji' },
    { id:2, name:'Смайл-пак Золото', emoji:'⭐', price:100, type:'emoji' },
    { id:3, name:'Рамка Лёд', emoji:'🔲', price:200, type:'frame' },
    { id:4, name:'Рамка Золото', emoji:'🟨', price:500, type:'frame' },
    { id:5, name:'Статус VIP', emoji:'💎', price:300, type:'badge' },
    { id:6, name:'Смайл Огонь', emoji:'🔥', price:75, type:'emoji' },
    { id:7, name:'Смайл Сердце', emoji:'💖', price:75, type:'emoji' },
    { id:8, name:'Смайл Смех', emoji:'🤣', price:50, type:'emoji' },
]);

function save() {
    DB.set('users',users); DB.set('chat',messages); DB.set('topics',topics);
    DB.set('news',news); DB.set('shop',shop);
    if(session) DB.set('session',session);
}

// ===== СМАЙЛЫ ДЛЯ ЧАТА =====
const SMILES = ['😀','😂','🤣','😍','🥰','😎','🤩','🥳','😡','😢','👍','👎','🎄','🎅','❄️','⭐','💎','🔥','💖','🎁','🍾','🎉','✨','🌟','💫'];

// ===== НАВИГАЦИЯ =====
const PAGES = [
    { id:'home', label:'Главная' },
    { id:'news', label:'Новости' },
    { id:'chat', label:'Чат' },
    { id:'forum', label:'Форум' },
    { id:'shop', label:'Магазин' },
    { id:'games', label:'Игры' },
    { id:'friends', label:'Друзья' },
    { id:'support', label:'Поддержка' },
    { id:'about', label:'О нас' },
    { id:'profile', label:'Профиль' },
];

function buildNav() {
    document.getElementById('nav-bar').innerHTML = PAGES.map(p =>
        `<button class="nav-btn" onclick="showPage('${p.id}')">${p.label}</button>`
    ).join('');
}

function showPage(id) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.nav-btn[onclick="showPage('${id}')"]`);
    if(btn) btn.classList.add('active');
    renderPage(id);
}

function renderPage(id) {
    const c = document.getElementById('main-content');
    switch(id) {
        case 'home': c.innerHTML = renderHome(); break;
        case 'news': c.innerHTML = renderNews(); break;
        case 'chat': c.innerHTML = renderChat(); break;
        case 'forum': c.innerHTML = renderForum(); break;
        case 'shop': c.innerHTML = renderShop(); break;
        case 'games': c.innerHTML = renderGames(); break;
        case 'friends': c.innerHTML = renderFriends(); break;
        case 'support': c.innerHTML = renderSupport(); break;
        case 'about': c.innerHTML = renderAbout(); break;
        case 'profile': c.innerHTML = renderProfile(); break;
    }
    updateHeader();
}

// ===== HEADER =====
function updateHeader() {
    document.getElementById('coin-display').innerText = session ? `❄${session.coins||0}` : '❄0';
    document.getElementById('user-avatar-top').src = session ? session.avatar : "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎅</text></svg>";
}

// ===== PAGES =====
function renderHome() {
    const now = new Date(), ny = new Date(now.getFullYear()+1,0,1);
    const days = Math.ceil((ny-now)/86400000);
    return `
        <div class="card" style="text-align:center;border-color:var(--gold);">
            <div style="font-size:48px;font-weight:900;color:var(--ice);">${days}</div>
            <div style="font-size:10px;letter-spacing:3px;color:var(--text2);">ДНЕЙ ДО НОВОГО ГОДА</div>
        </div>
        <div class="card">
            <b style="color:var(--ice);">СВОДКИ</b>
            ${news.slice(-3).reverse().map(n=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);"><b style="color:var(--gold);font-size:10px;">${esc(n.title)}</b><p style="font-size:9px;color:var(--text2);">${esc(n.text)}</p></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <div class="card" style="text-align:center;" onclick="showPage('shop')"><div style="font-size:24px;">🛒</div><div style="font-size:9px;">Магазин</div></div>
            <div class="card" style="text-align:center;" onclick="showPage('games')"><div style="font-size:24px;">🎲</div><div style="font-size:9px;">Игры</div></div>
            <div class="card" style="text-align:center;" onclick="showPage('friends')"><div style="font-size:24px;">👥</div><div style="font-size:9px;">Друзья</div></div>
            <div class="card" style="text-align:center;" onclick="showPage('chat')"><div style="font-size:24px;">💬</div><div style="font-size:9px;">Чат</div></div>
        </div>`;
}

function renderNews() {
    if(session&&(session.role==='dev'||session.role==='admin')) {
        return `<div class="card"><b style="color:var(--ice);">ДОБАВИТЬ НОВОСТЬ</b>
            <input type="text" id="news-title" placeholder="Заголовок">
            <textarea id="news-text" placeholder="Текст..."></textarea>
            <button class="btn btn-fill btn-sm" onclick="addNews()">ОПУБЛИКОВАТЬ</button></div>
            <div class="card">${news.slice().reverse().map(n=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);"><b style="color:var(--gold);">${esc(n.title)}</b><p style="font-size:9px;color:var(--text2);">${esc(n.text)}</p></div>`).join('')}</div>`;
    }
    return `<div class="card">${news.slice().reverse().map(n=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);"><b style="color:var(--gold);">${esc(n.title)}</b><p style="font-size:9px;color:var(--text2);">${esc(n.text)}</p></div>`).join('')}</div>`;
}

function addNews() {
    const t=document.getElementById('news-title').value.trim();
    const x=document.getElementById('news-text').value.trim();
    if(!t||!x) return;
    news.push({title:t,text:x,date:new Date().toLocaleDateString('ru-RU')});
    save(); showPage('news');
}

function renderChat() {
    return `<div class="card" style="height:400px;display:flex;flex-direction:column;">
        <b style="color:var(--ice);">ЧАТ</b>
        <div style="flex:1;overflow-y:auto;margin:8px 0;" id="chat-box">
            ${messages.length===0?'<p style="color:var(--text2);text-align:center;padding:20px;">СООБЩЕНИЙ НЕТ</p>':messages.slice(-30).map(m=>`
                <div class="chat-msg"><span class="badge">${m.role}</span> <span class="chat-author" style="color:${m.nick_color||'var(--ice)'};">${esc(m.username)}</span> <span style="font-size:7px;color:var(--text2);">${m.time}</span><br>${esc(m.text)}</div>
            `).join('')}
        </div>
        <div class="smile-panel" id="smile-panel">${SMILES.map(s=>`<span onclick="addSmile('${s}')">${s}</span>`).join('')}</div>
        <form onsubmit="sendChat(event)" style="display:flex;gap:4px;">
            <input type="text" id="chat-input" placeholder="Сообщение..." style="flex:1;margin:0;">
            <button type="submit" class="btn btn-fill btn-sm">→</button>
        </form>
    </div>`;
}

function addSmile(s) {
    const inp = document.getElementById('chat-input');
    if(inp) inp.value += s;
}

function sendChat(e) {
    e.preventDefault();
    if(!session) return toast('ВОЙДИТЕ');
    const inp = document.getElementById('chat-input');
    if(!inp.value.trim()) return;
    messages.push({username:session.username,role:session.role,nick_color:session.nick_color,text:inp.value.trim().substring(0,300),time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})});
    if(messages.length>100) messages=messages.slice(-100);
    save(); showPage('chat');
}

function renderForum() {
    return `<div class="card">
        <b style="color:var(--ice);">ФОРУМ</b>
        ${session?`<form onsubmit="createTopic(event)" style="display:flex;gap:4px;margin:8px 0;"><input type="text" id="topic-input" placeholder="Тема..." style="flex:1;margin:0;"><button class="btn btn-fill btn-sm">+</button></form>`:''}
        ${topics.length===0?'<p style="color:var(--text2);">ТЕМ НЕТ</p>':topics.slice().reverse().map(t=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);"><b style="color:var(--ice);">${esc(t.title)}</b><div style="font-size:8px;color:var(--text2);">${esc(t.author)}</div></div>`).join('')}
    </div>`;
}

function createTopic(e) {
    e.preventDefault();
    if(!session) return toast('ВОЙДИТЕ');
    const inp=document.getElementById('topic-input');
    if(!inp.value.trim()) return;
    topics.push({title:inp.value.trim(),author:session.username,date:new Date().toLocaleDateString('ru-RU')});
    save(); showPage('forum'); toast('ТЕМА СОЗДАНА');
}

// ===== МАГАЗИН =====
function renderShop() {
    if(!session) return '<div class="card"><p style="text-align:center;color:var(--text2);">ВОЙДИТЕ ДЛЯ ДОСТУПА К МАГАЗИНУ</p></div>';
    return `<div class="card"><b style="color:var(--ice);">МАГАЗИН</b> <span style="float:right;color:var(--gold);">❄${session.coins||0}</span>
        <div class="shop-grid" style="margin-top:8px;">
            ${shop.map(s=>`
                <div class="shop-item" onclick="buyItem(${s.id})">
                    <div class="emoji">${s.emoji}</div>
                    <div style="font-size:9px;font-weight:700;">${s.name}</div>
                    <div style="font-size:8px;color:var(--gold);">❄${s.price}</div>
                    ${(session.inventory||[]).includes(s.emoji)?'<span class="badge badge-gold">КУПЛЕНО</span>':''}
                </div>
            `).join('')}
        </div>
        <div style="margin-top:10px;"><b style="color:var(--ice);">ВАШ ИНВЕНТАРЬ:</b> ${(session.inventory||[]).join(' ')}</div>
    </div>`;
}

function buyItem(id) {
    if(!session) return;
    const item = shop.find(s=>s.id===id);
    if(!item) return;
    if((session.inventory||[]).includes(item.emoji)) return toast('УЖЕ КУПЛЕНО');
    if((session.coins||0) < item.price) return toast('НЕДОСТАТОЧНО СНЕЖИНОК');
    session.coins -= item.price;
    if(!session.inventory) session.inventory = [];
    session.inventory.push(item.emoji);
    const idx = users.findIndex(u=>u.id===session.id);
    if(idx>=0) users[idx] = session;
    save(); showPage('shop'); toast(`${item.name} КУПЛЕНО!`);
}

// ===== ИГРЫ =====
function renderGames() {
    if(!session) return '<div class="card"><p style="text-align:center;color:var(--text2);">ВОЙДИТЕ ДЛЯ ИГР</p></div>';
    return `
        <div class="card"><b style="color:var(--ice);">МИНИ-ИГРЫ</b></div>
        <div class="game-box" onclick="playDice()">
            <div style="font-size:32px;">🎲</div>
            <div style="font-weight:700;font-size:11px;">КОСТИ (СТАВКА 10❄)</div>
            <div style="font-size:9px;color:var(--text2);">Брось кубик. 4+ = выигрыш 20❄</div>
            <div id="dice-result" style="margin-top:6px;font-size:24px;"></div>
        </div>
        <div class="game-box" onclick="playGuess()" style="margin-top:8px;">
            <div style="font-size:32px;">❓</div>
            <div style="font-weight:700;font-size:11px;">УГАДАЙ ЧИСЛО (СТАВКА 5❄)</div>
            <div style="font-size:9px;color:var(--text2);">Угадай число от 1 до 5. Выигрыш 25❄</div>
            <div id="guess-result" style="margin-top:6px;font-size:24px;"></div>
        </div>`;
}

function playDice() {
    if(!session) return;
    if(session.coins < 10) return toast('НЕДОСТАТОЧНО СНЕЖИНОК');
    session.coins -= 10;
    const roll = Math.floor(Math.random()*6)+1;
    document.getElementById('dice-result').innerText = `🎲 ${roll}`;
    if(roll >= 4) { session.coins += 20; document.getElementById('dice-result').innerText += ' ВЫИГРЫШ!'; }
    else { document.getElementById('dice-result').innerText += ' ПРОИГРЫШ'; }
    const idx = users.findIndex(u=>u.id===session.id);
    if(idx>=0) users[idx] = session;
    save(); updateHeader();
}

function playGuess() {
    if(!session) return;
    if(session.coins < 5) return toast('НЕДОСТАТОЧНО СНЕЖИНОК');
    session.coins -= 5;
    const answer = Math.floor(Math.random()*5)+1;
    const guess = prompt('Введите число от 1 до 5:');
    if(!guess) return;
    document.getElementById('guess-result').innerText = `Загадано: ${answer}`;
    if(parseInt(guess) === answer) { session.coins += 25; document.getElementById('guess-result').innerText += ' ВЫИГРЫШ!'; }
    else { document.getElementById('guess-result').innerText += ' ПРОИГРЫШ'; }
    const idx = users.findIndex(u=>u.id===session.id);
    if(idx>=0) users[idx] = session;
    save(); updateHeader();
}

// ===== ДРУЗЬЯ =====
function renderFriends() {
    if(!session) return '<div class="card"><p style="text-align:center;color:var(--text2);">ВОЙДИТЕ</p></div>';
    return `<div class="card">
        <b style="color:var(--ice);">ДРУЗЬЯ</b>
        <form onsubmit="addFriend(event)" style="display:flex;gap:4px;margin:8px 0;"><input type="text" id="friend-input" placeholder="Логин друга..." style="flex:1;margin:0;"><button class="btn btn-fill btn-sm">+</button></form>
        <div style="margin-top:8px;"><b style="color:var(--ice);">СПИСОК:</b> ${(session.friends||[]).length===0?'<p style="color:var(--text2);font-size:9px;">НЕТ ДРУЗЕЙ</p>':session.friends.map(f=>`<div style="padding:4px;font-size:10px;color:var(--ice);">👤 ${f}</div>`).join('')}</div>
        ${(session.friendRequests||[]).length>0?`<div style="margin-top:8px;"><b style="color:var(--gold);">ЗАЯВКИ:</b> ${session.friendRequests.map(f=>`<div style="padding:4px;font-size:10px;">${f} <button class="btn btn-xs btn-fill" onclick="acceptFriend('${f}')">✓</button></div>`).join('')}</div>`:''}
    </div>`;
}

function addFriend(e) {
    e.preventDefault();
    if(!session) return;
    const name = document.getElementById('friend-input').value.trim();
    if(!name || name === session.username) return;
    const target = users.find(u=>u.username===name);
    if(!target) return toast('ПОЛЬЗОВАТЕЛЬ НЕ НАЙДЕН');
    if((session.friends||[]).includes(name)) return toast('УЖЕ В ДРУЗЬЯХ');
    if(!target.friendRequests) target.friendRequests = [];
    if(target.friendRequests.includes(session.username)) return toast('ЗАЯВКА УЖЕ ОТПРАВЛЕНА');
    target.friendRequests.push(session.username);
    save(); showPage('friends'); toast('ЗАЯВКА ОТПРАВЛЕНА');
}

function acceptFriend(name) {
    if(!session) return;
    if(!session.friends) session.friends = [];
    session.friends.push(name);
    session.friendRequests = (session.friendRequests||[]).filter(f=>f!==name);
    const target = users.find(u=>u.username===name);
    if(target) { if(!target.friends) target.friends = []; target.friends.push(session.username); }
    save(); showPage('friends'); toast('ДРУГ ДОБАВЛЕН');
}

// ===== ПОДДЕРЖКА =====
function renderSupport() {
    return `<div class="card"><b style="color:var(--ice);">ТЕХПОДДЕРЖКА</b>
        <p style="font-size:9px;color:var(--text2);margin:8px 0;">Опишите проблему:</p>
        <textarea id="support-msg" placeholder="Сообщение..."></textarea>
        <button class="btn btn-fill btn-sm" onclick="sendSupport()">ОТПРАВИТЬ</button>
    </div>`;
}
function sendSupport() { toast('СООБЩЕНИЕ ОТПРАВЛЕНО'); document.getElementById('support-msg').value=''; }

// ===== О НАС =====
function renderAbout() {
    return `<div class="card"><b style="color:var(--ice);">О НАС</b>
        <p style="font-size:10px;color:var(--text2);line-height:1.6;margin-top:8px;">Santa Workshop — закрытое сообщество. Магазин, игры, чат, форум, друзья. Всё в одном месте.</p>
        <p style="font-size:10px;color:var(--text2);margin-top:4px;">Версия: 6.0 | Директор: Santa Claus</p>
    </div>`;
}

// ===== ПРОФИЛЬ =====
function renderProfile() {
    if(!session) return `<div class="card" style="text-align:center;"><b style="color:var(--ice);">ПРОФИЛЬ</b>
        <p style="color:var(--text2);margin:10px 0;">Войдите или зарегистрируйтесь</p>
        <button class="btn btn-fill btn-sm" onclick="showLogin()">ВХОД</button>
        <button class="btn btn-sm" style="margin-top:4px;" onclick="showRegister()">РЕГИСТРАЦИЯ</button>
    </div>`;
    
    return `<div class="card" style="text-align:center;">
        <img src="${session.avatar}" style="width:70px;height:70px;border-radius:50%;border:2px solid var(--ice);">
        <div style="margin-top:6px;"><span class="badge">${session.role}</span></div>
        <h3 style="color:${session.nick_color};margin-top:4px;">${session.username}</h3>
        <p style="font-size:9px;color:var(--text2);">${session.status}</p>
        <p style="color:var(--gold);font-size:9px;">❄${session.coins||0} снежинок</p>
    </div>
    <div class="card">
        <b style="color:var(--ice);">РЕДАКТОР</b>
        <form onsubmit="saveProfile(event)" style="margin-top:6px;">
            <input type="text" id="edit-name" value="${session.username}">
            <input type="text" id="edit-status" value="${session.status}">
            <input type="text" id="edit-avatar" value="${session.avatar}">
            <label style="font-size:8px;color:var(--text2);">Цвет имени</label>
            <input type="color" id="edit-color" value="${session.nick_color}">
            <input type="password" id="edit-pass" placeholder="Новый пароль">
            <button type="submit" class="btn btn-fill btn-sm" style="width:100%;">СОХРАНИТЬ</button>
        </form>
        <button class="btn btn-sm" style="width:100%;margin-top:4px;border-color:var(--red);color:var(--red);" onclick="logout()">ВЫЙТИ</button>
    </div>`;
}

function saveProfile(e) {
    e.preventDefault();
    if(!session) return;
    const name=document.getElementById('edit-name').value.trim();
    if(name.length<3) return toast('ИМЯ ОТ 3 СИМВОЛОВ');
    session.username=name;
    session.status=document.getElementById('edit-status').value.trim()||session.status;
    session.avatar=document.getElementById('edit-avatar').value.trim()||session.avatar;
    session.nick_color=document.getElementById('edit-color').value;
    const pass=document.getElementById('edit-pass').value;
    if(pass&&pass.length>=4) session.password=pass;
    const idx=users.findIndex(u=>u.id===session.id);
    if(idx>=0) users[idx]=session;
    save(); showPage('profile'); updateHeader(); toast('ПРОФИЛЬ ОБНОВЛЁН');
}

// ===== AUTH =====
function showLogin() {
    const modal = document.getElementById('modal-container');
    modal.classList.add('active');
    modal.innerHTML = `<div class="modal-box"><b style="color:var(--ice);">ВХОД</b>
        <input type="text" id="auth-login" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn btn-fill btn-sm" style="width:100%;" onclick="doLogin()">ВОЙТИ</button>
        <button class="btn btn-sm" style="width:100%;margin-top:4px;" onclick="showRegister()">РЕГИСТРАЦИЯ</button>
    </div>`;
}
function showRegister() {
    const modal = document.getElementById('modal-container');
    modal.classList.add('active');
    modal.innerHTML = `<div class="modal-box"><b style="color:var(--ice);">РЕГИСТРАЦИЯ</b>
        <input type="text" id="reg-login" placeholder="Логин">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <input type="text" id="reg-status" placeholder="Статус">
        <label style="font-size:8px;color:var(--text2);">Цвет имени</label>
        <input type="color" id="reg-color" value="#c8e6f5">
        <button class="btn btn-fill btn-sm" style="width:100%;" onclick="doRegister()">СОЗДАТЬ</button>
        <button class="btn btn-sm" style="width:100%;margin-top:4px;" onclick="showLogin()">НАЗАД</button>
    </div>`;
}
function closeModal() { document.getElementById('modal-container').classList.remove('active'); }
function doLogin() {
    const u=document.getElementById('auth-login').value.trim();
    const p=document.getElementById('auth-pass').value;
    const user=users.find(x=>x.username===u&&x.password===p);
    if(!user) return toast('НЕВЕРНО');
    if(user.banned) return toast('БАН');
    session=user; save(); closeModal(); showPage('profile'); updateHeader(); toast('ДОБРО ПОЖАЛОВАТЬ');
}
function doRegister() {
    const u=document.getElementById('reg-login').value.trim();
    const p=document.getElementById('reg-pass').value;
    const s=document.getElementById('reg-status').value.trim()||'ГОСТЬ';
    const c=document.getElementById('reg-color').value;
    if(u.length<3||p.length<4) return toast('ЛОГИН ОТ 3, ПАРОЛЬ ОТ 4');
    if(users.find(x=>x.username===u)) return toast('ЗАНЯТО');
    users.push({id:Date.now(),username:u,password:p,role:'user',avatar:`https://i.pravatar.cc/150?u=${encodeURIComponent(u)}`,status:s,nick_color:c,banned:false,coins:100,inventory:[],friends:[],friendRequests:[]});
    save(); closeModal(); toast('АККАУНТ СОЗДАН'); showLogin();
}
function logout() { session=null; DB.set('session',null); showPage('home'); updateHeader(); }

// ===== HELPERS =====
function toast(msg) {
    const old=document.querySelector('.toast'); if(old) old.remove();
    const t=document.createElement('div'); t.className='toast'; t.innerText=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}
function esc(s) { const d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

// ===== INIT =====
buildNav(); showPage('home'); updateHeader();
document.getElementById('modal-container').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>

</body>
</html>
