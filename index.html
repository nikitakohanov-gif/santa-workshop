<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANTA NEXUS | Gold Retro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030308;
            --surface: rgba(15, 15, 35, 0.9);
            --gold: #d4a843;
            --gold-light: #f3cf7a;
            --red: #a52a2a;
            --text: #ffffff;
            --border: rgba(212, 168, 67, 0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Playfair Display', serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at top, #0a0a25 0%, #030308 100%);
        }

        /* Эффект снега */
        .snow { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/snow.png'); opacity: 0.3; animation: snowMove 20s linear infinite; }
        @keyframes snowMove { from { background-position: 0 0; } to { background-position: 500px 1000px; } }

        .app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }

        /* Header */
        .header {
            padding: 25px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--gold); background: rgba(5, 5, 15, 0.8); backdrop-filter: blur(10px);
        }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--gold); text-shadow: 0 0 10px rgba(212, 168, 67, 0.5); }

        /* Content Area */
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 180px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Vinyl Player */
        .retro-player {
            position: fixed; bottom: 85px; left: 15px; right: 15px; max-width: 450px; margin: 0 auto;
            background: #0a0a1a; border: 2px solid var(--gold); border-radius: 35px;
            padding: 15px; z-index: 1000; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 30px rgba(212, 168, 67, 0.2);
        }
        .vinyl-box { width: 60px; height: 60px; position: relative; }
        .vinyl {
            width: 100%; height: 100%; background: #000; border-radius: 50%;
            border: 4px solid #111; display: flex; align-items: center; justify-content: center;
        }
        .vinyl.playing { animation: spin 5s linear infinite; }
        .vinyl::after { content:''; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-info { flex: 1; overflow: hidden; }
        .track-title { font-size: 14px; font-weight: bold; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 11px; color: #8e8e93; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-p { background: var(--gold); color: #000; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #050510; border-top: 1px solid var(--gold); display: flex; justify-content: space-around; padding: 15px; }
        .nav-btn { background: none; border: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 20px; }

        /* Auth */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .overlay.active { display: flex; }
        .auth-box { background: #0f0f1f; border: 2px solid var(--gold); padding: 30px; border-radius: 30px; width: 85%; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; }
        .btn-gold { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="snow"></div>

<div class="app">
    <header class="header">
        <div class="logo">SANTA <span>GOLD</span></div>
        <div id="u-ava" onclick="nav('profile')"></div>
    </header>

    <div class="content">
        <!-- Home -->
        <div class="page active" id="home">
            <div class="card" style="text-align:center; background: linear-gradient(to bottom, rgba(212,168,67,0.1), transparent);">
                <div id="countdown" style="font-size: 60px; font-weight: 900; color: var(--gold);">0</div>
                <div style="letter-spacing: 5px; font-size: 12px;">ДНЕЙ ДО ПРАЗДНИКА</div>
            </div>
            <div class="card">
                <h3 style="color:var(--gold); margin-bottom:10px;"><i class="fa-solid fa-snowflake"></i> Последние сводки</h3>
                <div id="news-list"></div>
            </div>
        </div>

        <!-- Chat -->
        <div class="page" id="chat">
            <div class="card" style="height: 450px; display: flex; flex-direction: column;">
                <div id="msg-box" style="flex:1; overflow-y:auto; margin-bottom:15px;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="m-in" placeholder="Ваше сообщение...">
                    <button onclick="send()" class="btn-p"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div class="page" id="profile">
            <div class="card" id="profile-card" style="text-align:center;">
                <p>Требуется авторизация</p>
            </div>
        </div>
    </div>

    <!-- Player -->
    <div class="retro-player">
        <div class="vinyl-box"><div class="vinyl" id="v-rot"></div></div>
        <div class="player-info">
            <div class="track-title" id="t-title">Classic Jingle</div>
            <div class="track-artist" id="t-art">Loading...</div>
        </div>
        <div class="controls">
            <i class="fa-solid fa-step-backward" onclick="change(-1)" style="color:var(--gold)"></i>
            <button class="btn-p" onclick="toggle()"><i class="fa-solid fa-play" id="p-icon"></i></button>
            <i class="fa-solid fa-step-forward" onclick="change(1)" style="color:var(--gold)"></i>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="nav('home')"><i class="fa-solid fa-house"></i>Дом</button>
        <button class="nav-btn" onclick="nav('chat')"><i class="fa-solid fa-comment"></i>Чат</button>
        <button class="nav-btn" onclick="nav('profile')"><i class="fa-solid fa-user"></i>Профиль</button>
    </nav>
</div>

<div class="overlay" id="auth">
    <div class="auth-box">
        <h2 style="color:var(--gold); margin-bottom:15px;">ВХОД</h2>
        <input type="text" id="u-name" placeholder="Логин">
        <input type="password" id="u-pass" placeholder="Пароль">
        <button class="btn-gold" onclick="login()">ВОЙТИ</button>
    </div>
</div>

<script>
const PLAYLIST = [
    { n: "White Christmas", a: "Bing Crosby", s: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { n: "Let It Snow!", a: "Dean Martin", s: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { n: "Jingle Bells", a: "Frank Sinatra", s: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { n: "Rockin' Around", a: "Brenda Lee", s: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" }
];

let cur = 0, playing = false, audio = new Audio();
let session = JSON.parse(localStorage.getItem('santa_session')) || null;

function load(i) {
    const t = PLAYLIST[i];
    document.getElementById('t-title').innerText = t.n;
    document.getElementById('t-art').innerText = t.a;
    audio.src = t.s;
}

function toggle() {
    if(playing) audio.pause(); else audio.play().catch(e => console.log("Init required"));
    playing = !playing;
    document.getElementById('p-icon').className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';
    document.getElementById('v-rot').classList.toggle('playing', playing);
}

function change(d) {
    cur = (cur + d + PLAYLIST.length) % PLAYLIST.length;
    load(cur);
    if(playing) audio.play();
}

function nav(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if(id === 'profile' && !session) document.getElementById('auth').classList.add('active');
    update();
}

function login() {
    const u = document.getElementById('u-name').value, p = document.getElementById('u-pass').value;
    if(u === 'Santa' && p === 'admin') {
        session = { name: 'Santa', ava: 'https://i.pravatar.cc/100?u=santa' };
        localStorage.setItem('santa_session', JSON.stringify(session));
        document.getElementById('auth').classList.remove('active');
        update();
    }
}

function update() {
    const countdown = Math.ceil((new Date(2027,0,1) - new Date()) / 86400000);
    document.getElementById('countdown').innerText = countdown;
    
    if(session) {
        document.getElementById('u-ava').innerHTML = `<img src="${session.ava}" style="width:35px; border-radius:50%; border:1px solid var(--gold)">`;
        document.getElementById('profile-card').innerHTML = `<h3>${session.name}</h3><p style="color:var(--gold)">DIRECTOR</p><br><button onclick="localStorage.clear(); location.reload();" class="btn-gold" style="background:var(--red); color:white">ВЫЙТИ</button>`;
    }
    
    document.getElementById('news-list').innerHTML = `<div style="padding:10px 0; border-bottom:1px solid #222"><small>${new Date().toLocaleDateString()}</small><br><b>Система NEXUS активна.</b> Мониторинг запущен.</div>`;
}

audio.addEventListener('ended', () => change(1));
load(0); update();
</script>
</body>
</html>
