<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTA OS v2.0 | NORTH POLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d42426; --green: #165b33; --gold: #f8b229; --snow: #ffffff;
            --dark: #0b0d0f; --accent: #24a159;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: var(--dark); color: var(--snow); height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1a472a 0%, #0b0d0f 100%);
        }

        canvas#snow { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

        .layout { display: flex; height: 100vh; position: relative; z-index: 10; }

        /* SIDEBAR */
        .sidebar {
            width: 280px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            padding: 30px 20px;
        }

        .santa-profile { text-align: center; margin-bottom: 40px; }
        .avatar { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); 
            margin-bottom: 15px; box-shadow: 0 0 20px var(--gold);
        }
        .santa-profile h2 { font-family: 'Marck Script', cursive; color: var(--gold); font-size: 28px; }

        .nav-menu { flex: 1; }
        .nav-btn {
            width: 100%; padding: 15px; margin-bottom: 10px; background: none;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--snow);
            cursor: pointer; text-align: left; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--red); border-color: var(--gold); transform: translateX(5px); }

        /* MAIN CONTENT */
        .main-view { flex: 1; padding: 40px; overflow-y: auto; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px;
            margin-bottom: 30px;
        }

        h1 { font-family: 'Marck Script', cursive; font-size: 42px; margin-bottom: 20px; color: var(--gold); }

        /* WIDGETS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        /* TO-DO LIST */
        .todo-input { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--gold); 
            padding: 12px; border-radius: 8px; color: white; outline: none;
        }
        .add-btn { background: var(--green); border: none; padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .todo-item { 
            display: flex; justify-content: space-between; padding: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.4s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* REINDEER STATUS */
        .reindeer-card { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* MUSIC PLAYER */
        .player {
            position: fixed; bottom: 20px; right: 20px; width: 300px;
            background: var(--red); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 200;
            border: 2px solid var(--gold);
        }

        /* UTILS */
        .scroll-v::-webkit-scrollbar { width: 6px; }
        .scroll-v::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="layout">
    <aside class="sidebar">
        <div class="santa-profile">
            <div class="avatar" style="background: url('https://img.icons8.com/color/96/santa.png') center/cover;"></div>
            <h2>Santa Claus</h2>
            <p style="font-size: 10px; opacity: 0.6; letter-spacing: 2px;">HEAD OF OPERATIONS</p>
        </div>

        <nav class="nav-menu">
            <button class="nav-btn active" onclick="loadPage('dash')">📊 Дашборд</button>
            <button class="nav-btn" onclick="loadPage('gifts')">🎁 Фабрика</button>
            <button class="nav-btn" onclick="loadPage('reindeer')">🦌 Олени</button>
            <button class="nav-btn" onclick="loadPage('list')">📝 Списки</button>
        </nav>

        <div style="font-size: 11px; opacity: 0.5; text-align: center;">North Pole System v2.0.26</div>
    </aside>

    <main class="main-view scroll-v" id="view">
        <!-- Контент грузится сюда -->
    </main>
</div>

<div class="player">
    <div style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">📻 NORTH POLE RADIO</div>
    <audio id="audio" src="https://christmas.allstreaming.net:8000/christmas" preload="none"></audio>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button onclick="toggleMusic()" id="playBtn" style="background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px;">▶</button>
        <div style="font-size: 11px;">Прямой эфир из Лапландии</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'santa_todo_list';

    const PAGES = {
        dash: `
            <h1>Мастерская сегодня</h1>
            <div class="grid">
                <div class="glass-panel">
                    <h3>Температура: -35°C</h3>
                    <p style="margin-top:10px; opacity:0.7;">Идеально для хранения ледяных скульптур и заморозки леденцов.</p>
                </div>
                <div class="glass-panel">
                    <h3>До вылета: 231 день</h3>
                    <div style="width:100%; background:#000; height:10px; border-radius:5px; margin-top:15px;">
                        <div style="width:35%; background:var(--gold); height:100%; border-radius:5px; box-shadow:0 0 10px var(--gold);"></div>
                    </div>
                </div>
            </div>
            <div class="glass-panel" style="margin-top:25px;">
                <h3>Последние новости</h3>
                <p style="font-size:14px; margin-top:10px;">• Эльф Бернард изобрел упаковку, которая не рвется.<br>• Рудольф прошел техосмотр носа.</p>
            </div>
        `,
        gifts: `
            <h1>Производственные линии</h1>
            <div class="grid">
                <div class="glass-panel" style="border-left: 5px solid var(--gold);">
                    <h3>LEGO-наборы</h3>
                    <p>Прогресс: 88%</p>
                </div>
                <div class="glass-panel" style="border-left: 5px solid #ff4d4d;">
                    <h3>Видеокарты</h3>
                    <p>Дефицит чипов, ждем поставку от гномов.</p>
                </div>
                <div class="glass-panel" style="border-left: 5px solid var(--accent);">
                    <h3>Книги сказок</h3>
                    <p>Прогресс: 100% (Упаковано)</p>
                </div>
            </div>
        `,
        reindeer: `
            <h1>Ангар 01</h1>
            <div class="grid">
                <div class="glass-panel">
                    <div class="reindeer-card"><span>Рудольф</span><div class="status-dot"></div></div>
                    <div class="reindeer-card"><span>Комета</span><div class="status-dot"></div></div>
                    <div class="reindeer-card"><span>Танцор</span><div class="status-dot"></div></div>
                    <div class="reindeer-card"><span>Гром</span><div class="status-dot" style="background:orange"></div></div>
                    <p style="font-size:10px; margin-top:10px;">* Гром на плановом кормлении яблоками</p>
                </div>
            </div>
        `,
        list: `
            <h1>Списки дел</h1>
            <div class="glass-panel">
                <div class="todo-input">
                    <input type="text" id="todoIn" placeholder="Добавить задачу (напр. Покормить оленей)">
                    <button class="add-btn" onclick="addTodo()">ДОБАВИТЬ</button>
                </div>
                <div id="todoList"></div>
            </div>
        `
    };

    // НАВИГАЦИЯ
    function loadPage(page) {
        document.getElementById('view').innerHTML = PAGES[page];
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('onclick').includes(page));
        });
        if(page === 'list') renderTodos();
    }

    // TODO ЛОГИКА
    function getTodos() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    function addTodo() {
        const input = document.getElementById('todoIn');
        if(!input.value) return;
        const todos = getTodos();
        todos.push(input.value);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        input.value = '';
        renderTodos();
    }
    function removeTodo(index) {
        const todos = getTodos();
        todos.splice(index, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        renderTodos();
    }
    function renderTodos() {
        const list = document.getElementById('todoList');
        if(!list) return;
        const todos = getTodos();
        list.innerHTML = todos.map((t, i) => `
            <div class="todo-item">
                <span>❄️ ${t}</span>
                <button onclick="removeTodo(${i})" style="background:none; border:none; color:var(--red); cursor:pointer;">✖</button>
            </div>
        `).join('');
    }

    // МУЗЫКА
    let isPlaying = false;
    function toggleMusic() {
        const audio = document.getElementById('audio');
        const btn = document.getElementById('playBtn');
        if(!isPlaying) {
            audio.play();
            btn.innerText = '⏸';
        } else {
            audio.pause();
            btn.innerText = '▶';
        }
        isPlaying = !isPlaying;
    }

    // СНЕГ
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let w, h, flakes = [];

    function initSnow() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        flakes = Array(150).fill().map(() => ({
            x: Math.random() * w, y: Math.random() * h,
            r: Math.random() * 3 + 1, d: Math.random() * 1
        }));
    }

    function drawSnow() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y);
            ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            f.y += Math.cos(f.d) + 1 + f.r / 2;
            f.x += Math.sin(0) * 2;
            if (f.y > h) { f.y = -10; f.x = Math.random() * w; }
        });
        ctx.fill();
        requestAnimationFrame(drawSnow);
    }

    window.addEventListener('resize', initSnow);
    initSnow();
    drawSnow();
    loadPage('dash');
</script>

</body>
</html>
