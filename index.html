<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTA GLOBAL TECH | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #e63946;
            --gold: #ffb703;
            --success: #2a9d8f;
            --bg: #05070a;
            --panel: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e1dd;
            --text-dim: #8b8c89;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }

        canvas#snow { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.5; }

        /* ГИРЛЯНДА КОРПОРАТИВНАЯ */
        .header-lights {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px; 
            display: flex; z-index: 1000;
        }
        .light-segment { flex: 1; height: 100%; transition: 1s; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; filter: blur(2px); } to { opacity: 1; filter: blur(0px); } }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 280px; background: rgba(10, 12, 16, 0.95);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            backdrop-filter: blur(20px); z-index: 100; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand { padding: 30px; display: flex; align-items: center; gap: 12px; }
        .brand-logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: grid; place-items: center; font-weight: 900; color: white; box-shadow: 0 0 20px rgba(230, 57, 70, 0.4); }
        .brand-name { font-family: 'Marck Script', cursive; font-size: 24px; color: var(--gold); }

        .nav-group { padding: 0 15px; flex: 1; }
        .nav-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 10px 15px; }
        
        .nav-link {
            display: flex; align-items: center; padding: 12px 15px; border-radius: 12px;
            color: var(--text-dim); text-decoration: none; transition: 0.2s; cursor: pointer; margin-bottom: 4px;
        }
        .nav-link:hover { background: var(--panel); color: #fff; }
        .nav-link.active { background: rgba(230, 57, 70, 0.1); color: var(--accent); border: 1px solid rgba(230, 57, 70, 0.2); }
        .nav-link i { margin-right: 15px; font-size: 18px; width: 20px; text-align: center; font-style: normal; }

        /* ВЕРХНИЙ БАР */
        .top-bar {
            height: 70px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            background: rgba(5, 7, 10, 0.5); backdrop-filter: blur(10px);
        }

        .search-box { background: var(--panel); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; width: 300px; display: flex; align-items: center; }
        .search-box input { background: none; border: none; color: #fff; outline: none; margin-left: 10px; width: 100%; font-size: 13px; }

        .user-actions { display: flex; align-items: center; gap: 20px; }
        .notif-bell { position: relative; cursor: pointer; color: var(--text-dim); }
        .notif-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid var(--bg); }

        /* КОНТЕНТ */
        .stage { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }

        /* КАРТОЧКИ И ВИДЖЕТЫ */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 20px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }
        .stat-val { font-size: 28px; font-weight: 700; margin: 10px 0; color: #fff; }
        .stat-label { color: var(--text-dim); font-size: 13px; display: flex; align-items: center; gap: 5px; }

        /* ПРОФИЛЬ КОРПОРАТИВНЫЙ */
        .profile-hero { display: flex; gap: 40px; background: linear-gradient(135deg, rgba(230, 57, 70, 0.1) 0%, transparent 100%); padding: 40px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 40px; }
        .avatar-large { width: 140px; height: 140px; border-radius: 30px; background: url('https://img.icons8.com/color/200/santa.png') center/cover; border: 4px solid var(--bg); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .profile-badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 10px; text-transform: uppercase; }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: 1s; }

        /* КНОПКИ */
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #ff4d5a; box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3); }
        .btn-outline { background: none; border: 1px solid var(--border); color: #fff; }
        .btn-outline:hover { background: var(--panel); }

        /* ВХОД (СКРЫТ) */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: grid; place-items: center; }
        .login-card { width: 400px; text-align: center; padding: 50px; background: var(--panel); border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(30px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="snow"></canvas>
<div class="header-lights" id="lights"></div>

<!-- ЭКРАН ВХОДА -->
<div id="login-screen">
    <div class="login-card">
        <div class="brand-logo" style="margin: 0 auto 20px; width: 60px; height: 60px; font-size: 24px;">S</div>
        <h2 style="font-size: 24px; margin-bottom: 10px;">Корпоративный вход</h2>
        <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">Система управления Santa Global Tech v.2.7</p>
        <input type="password" id="pass" placeholder="Ключ доступа (admin)" style="width:100%; padding:15px; background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:12px; color:white; margin-bottom:20px; outline:none; text-align:center;">
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="login()">Авторизоваться</button>
    </div>
</div>

<!-- ОСНОВНОЙ ПРИЛОЖЕНИЕ -->
<aside class="sidebar">
    <div class="brand">
        <div class="brand-logo">S</div>
        <div class="brand-name">SantaCorp</div>
    </div>

    <div class="nav-group">
        <div class="nav-label">Аналитика</div>
        <div class="nav-link active" onclick="show('dash')"><i>📊</i><span>Дашборд</span></div>
        <div class="nav-link" onclick="show('factory')"><i>🏭</i><span>Производство</span></div>
        
        <div class="nav-label">Команда</div>
        <div class="nav-link" onclick="show('elves')"><i>🧝</i><span>Эльфы-соискатели</span></div>
        <div class="nav-link" onclick="show('chat')"><i>💬</i><span>Центр связи</span></div>

        <div class="nav-label">Система</div>
        <div class="nav-link" onclick="show('profile')"><i>👤</i><span>Аккаунт профиля</span></div>
        <div class="nav-link" onclick="show('settings')"><i>⚙️</i><span>Конфигурация</span></div>
    </div>

    <div style="padding: 20px;">
        <div class="nav-link" style="color: var(--accent);" onclick="location.reload()"><i>🚪</i><span>Завершить сессию</span></div>
    </div>
</aside>

<div class="stage hidden" id="main-stage">
    <header class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Поиск по реестру подарков...">
        </div>
        <div class="user-actions">
            <div class="notif-bell">🔔<div class="notif-dot"></div></div>
            <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                <div style="text-align: right;">
                    <div style="font-size: 13px; font-weight: 600;">Santa Claus</div>
                    <div style="font-size: 11px; color: var(--success);">Chief Executive</div>
                </div>
                <img src="https://img.icons8.com/color/48/santa.png" width="35" style="border-radius: 8px;">
            </div>
        </div>
    </header>

    <main class="content-scroll" id="content">
        <!-- Сюда инжектится контент через JS -->
    </main>
</div>

<script>
    // Инициализация гирлянды
    const colors = ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#ffb703'];
    const lights = document.getElementById('lights');
    for(let i=0; i<60; i++) {
        const seg = document.createElement('div');
        seg.className = 'light-segment';
        seg.style.background = colors[i % colors.length];
        seg.style.animationDelay = (i * 0.05) + 's';
        lights.appendChild(seg);
    }

    function login() {
        if(document.getElementById('pass').value === 'admin') {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-stage').classList.remove('hidden');
            show('dash');
        } else { alert('Ключ отклонен.'); }
    }

    const UI = {
        dash: `
            <h1 style="margin-bottom: 10px;">Глобальный мониторинг</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Обзор активности Северного Полюса на 2026-2027 год</p>
            
            <div class="grid-stats">
                <div class="stat-card">
                    <div class="stat-label">🟢 Выполнено заказов</div>
                    <div class="stat-val">842,903</div>
                    <div style="font-size:12px; color:var(--success);">+12% за эту неделю</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⏳ В обработке</div>
                    <div class="stat-val">128,440</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 65%;"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">❄️ Магический фон</div>
                    <div class="stat-val">9.81 mS</div>
                    <div style="font-size:12px; color:var(--gold);">Стабильно (High Energy)</div>
                </div>
            </div>

            <div class="stat-card">
                <h3>Активность цехов</h3>
                <div style="margin-top:20px; height:150px; display:flex; align-items:flex-end; gap:10px;">
                    <div style="flex:1; background:var(--accent); height:40%; border-radius:5px;"></div>
                    <div style="flex:1; background:var(--accent); height:70%; border-radius:5px;"></div>
                    <div style="flex:1; background:var(--accent); height:90%; border-radius:5px;"></div>
                    <div style="flex:1; background:var(--accent); height:55%; border-radius:5px;"></div>
                    <div style="flex:1; background:var(--accent); height:85%; border-radius:5px;"></div>
                </div>
            </div>
        `,
        profile: `
            <div class="profile-hero">
                <div class="avatar-large"></div>
                <div style="flex:1;">
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
                        <span class="profile-badge">PRO LEVEL</span>
                        <h1 style="font-size:32px;">Santa Claus</h1>
                    </div>
                    <p style="color:var(--text-dim); margin-bottom:20px;">Генеральный директор Santa Global Tech. Архитектор праздничных систем и мастер логистики мирового масштаба.</p>
                    <div style="display:flex; gap:15px;">
                        <button class="btn btn-primary">Редактировать профиль</button>
                        <button class="btn btn-outline">Настройки доступа</button>
                    </div>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:30px;">
                <div class="stat-card">
                    <h3>Профессиональные навыки</h3>
                    <div style="margin-top:20px;">
                        <p style="font-size:13px; margin-bottom:5px; display:flex; justify-content:space-between;">Логистика оленей <span>95%</span></p>
                        <div class="progress-bar"><div class="progress-fill" style="width:95%;"></div></div>
                        <p style="font-size:13px; margin:15px 0 5px; display:flex; justify-content:space-between;">Магия Рождества <span>100%</span></p>
                        <div class="progress-bar"><div class="progress-fill" style="width:100%; background:var(--gold);"></div></div>
                        <p style="font-size:13px; margin:15px 0 5px; display:flex; justify-content:space-between;">Управление эльфами <span>88%</span></p>
                        <div class="progress-bar"><div class="progress-fill" style="width:88%; background:var(--success);"></div></div>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Связанные аккаунты</h3>
                    <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                        <div style="padding:10px; border:1px solid var(--border); border-radius:10px; font-size:12px;">Telegram: @santa_official</div>
                        <div style="padding:10px; border:1px solid var(--border); border-radius:10px; font-size:12px;">Work: office@northpole.com</div>
                    </div>
                </div>
            </div>
        `
    };

    function show(page) {
        const target = UI[page] || `<h1>Раздел ${page}</h1><div class="stat-card">Модуль находится в разработке инженерами-эльфами.</div>`;
        document.getElementById('content').innerHTML = target;
        document.querySelectorAll('.nav-link').forEach(l => {
            l.classList.toggle('active', l.getAttribute('onclick').includes(`'${page}'`));
        });
    }

    // Снег (оптимизированный)
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let w, h, p = [];
    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        p = Array(80).fill().map(() => ({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2+1, s:Math.random()*1+0.5}));
    }
    function draw() {
        ctx.clearRect(0,0,w,h); ctx.fillStyle="white"; ctx.beginPath();
        p.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y+=f.s; if(f.y>h) f.y=-10; });
        ctx.fill(); requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init); init(); draw();
</script>
</body>
</html>
