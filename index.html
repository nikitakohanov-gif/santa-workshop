<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTA WORKSHOP | MEGA HOLIDAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d42426; --green: #165b33; --gold: #f8b229; --dark: #07090c;
            --surface: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }

        canvas#snow { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }

        /* --- ГИРЛЯНДЫ НА ШАПКЕ --- */
        .lights {
            position: fixed; top: 0; left: 0; width: 100%; height: 20px;
            background: url('https://www.transparenttextures.com/patterns/black-linen.png'); /* заглушка под текстуру */
            z-index: 2100; display: flex; justify-content: space-around; pointer-events: none;
        }
        .light {
            width: 12px; height: 18px; border-radius: 50%;
            position: relative; top: -5px;
            animation: glow 1.5s infinite alternate;
        }
        .light:nth-child(4n+1) { background: #ff2424; box-shadow: 0 0 15px #ff2424; animation-delay: 0s; }
        .light:nth-child(4n+2) { background: #24ff24; box-shadow: 0 0 15px #24ff24; animation-delay: 0.4s; }
        .light:nth-child(4n+3) { background: #2424ff; box-shadow: 0 0 15px #2424ff; animation-delay: 0.8s; }
        .light:nth-child(4n+4) { background: #ffff24; box-shadow: 0 0 15px #ffff24; animation-delay: 1.2s; }

        @keyframes glow { from { opacity: 0.4; filter: brightness(0.8); } to { opacity: 1; filter: brightness(1.3); } }

        /* --- АВТОРИЗАЦИЯ --- */
        #auth-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a472a 0%, #05070a 100%);
            z-index: 3000; display: flex; align-items: center; justify-content: center; transition: 0.8s;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border);
            width: 420px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }
        .auth-card h1 { font-family: 'Marck Script', cursive; font-size: 42px; color: var(--gold); margin-bottom: 20px; }
        .auth-card input {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none;
        }
        .btn-main {
            width: 100%; padding: 15px; background: var(--red); border: none; border-radius: 12px;
            color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { background: #f00; transform: scale(1.02); }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        .layout { display: flex; height: 100vh; padding-top: 20px; }

        /* БОКОВАЯ ПАНЕЛЬ С ЧАТОМ */
        .sidebar {
            width: 320px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .chat-area, .sidebar.collapsed span, .sidebar.collapsed .logo-text { display: none; }

        .nav-list { padding: 15px; flex: 0; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px; border-radius: 12px;
            cursor: pointer; margin-bottom: 5px; color: #ccc; transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: var(--surface); color: var(--gold); }
        .nav-item i { min-width: 35px; font-size: 18px; }

        /* ИНТЕГРИРОВАННЫЙ ЧАТ */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; border-top: 1px solid var(--border);
            margin-top: 20px; background: rgba(0,0,0,0.2);
        }
        .chat-title { padding: 15px; font-size: 12px; font-weight: bold; color: var(--gold); letter-spacing: 1px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; }
        .chat-msg { margin-bottom: 10px; padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .chat-msg b { color: var(--gold); display: block; font-size: 10px; }
        .chat-input-box { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 5px; }
        .chat-input-box input { flex: 1; background: transparent; border: none; color: white; font-size: 12px; outline: none; }

        /* КОНТЕНТ */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        
        /* ЕЛКА ВНИЗУ */
        .footer-decor {
            position: fixed; bottom: -10px; right: 20px; pointer-events: none; z-index: 1500;
            filter: drop-shadow(0 0 20px rgba(22, 91, 51, 0.5));
        }

        .glass-panel { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 25px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="lights" id="lights"></div>
<canvas id="snow"></canvas>

<!-- ОКНО ВХОДА -->
<div id="auth-overlay">
    <div class="auth-card">
        <h1>Санта OS</h1>
        <p style="font-size: 12px; margin-bottom: 20px; opacity: 0.7;">Добро пожаловать в Мастерскую</p>
        <input type="text" id="u" placeholder="Логин (admin)">
        <input type="password" id="p" placeholder="Пароль (santa2027)">
        <button class="btn-main" onclick="auth()">ВОЙТИ В СИСТЕМУ</button>
        <p style="margin-top: 15px; font-size: 11px;">Нет аккаунта? <span style="color:var(--gold); cursor:pointer">Создать</span></p>
    </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="layout hidden" id="app">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px; display: flex; align-items: center; justify-content: space-between;">
            <div class="logo-text" style="font-family: 'Marck Script'; color: var(--gold); font-size: 22px;">Workshop</div>
            <div style="cursor:pointer; color: var(--gold);" onclick="toggleSide()">☰</div>
        </div>

        <nav class="nav-list">
            <div class="nav-item active" onclick="nav('home')"><i>🏠</i><span>Главная</span></div>
            <div class="nav-item" onclick="nav('admin')"><i>⚡</i><span>Админка</span></div>
            <div class="nav-item" onclick="nav('profile')"><i>👤</i><span>Профиль</span></div>
            <div class="nav-item" onclick="nav('support')"><i>🛠</i><span>Поддержка</span></div>
            <div class="nav-item" style="color: var(--red)" onclick="location.reload()"><i>🚪</i><span>Выход</span></div>
        </nav>

        <!-- ПЕРЕНЕСЕННЫЙ ЧАТ -->
        <div class="chat-area">
            <div class="chat-title">ЧАТ ЭЛЬФОВ ❄️</div>
            <div class="chat-messages" id="msgs">
                <div class="chat-msg"><b>Бернард:</b> Подарки на конвейере!</div>
                <div class="chat-msg"><b>Система:</b> Олени готовы к вылету.</div>
            </div>
            <div class="chat-input-box">
                <input type="text" id="msgIn" placeholder="Сообщение...">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--gold); cursor:pointer;">➔</button>
            </div>
        </div>
    </aside>

    <main class="main-content" id="view">
        <!-- Контент -->
    </main>
</div>

<!-- ЕЛКА -->
<div class="footer-decor">
    <img src="https://img.icons8.com/color/240/christmas-tree.png" alt="Елка">
</div>

<script>
    // Создаем гирлянду динамически
    const lightsCont = document.getElementById('lights');
    for(let i=0; i<40; i++) {
        const l = document.createElement('div');
        l.className = 'light';
        lightsCont.appendChild(l);
    }

    function auth() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        if(user === 'admin' && pass === 'santa2027') {
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                nav('home');
            }, 600);
        } else { alert('Доступ запрещен!'); }
    }

    function toggleSide() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function nav(p) {
        const v = document.getElementById('view');
        const pages = {
            home: `<h1>Главный пульт</h1><div class="glass-panel"><h3>С возвращением, Санта!</h3><p>Сегодня на фабрике произведено 12,400 игрушек.</p></div>`,
            admin: `<h1>Панель администратора</h1><div class="glass-panel">Статистика узлов: OK<br>Загрузка магии: 94%</div>`,
            profile: `<h1>Ваш профиль</h1><div class="glass-panel">Логин: admin<br>Доступ: Разработчик</div>`,
            support: `<h1>Техподдержка</h1><div class="glass-panel"><p>Опишите проблему эльфам-техникам.</p></div>`
        };
        v.innerHTML = pages[p];
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    }

    function sendMsg() {
        const i = document.getElementById('msgIn');
        if(!i.value) return;
        const m = document.getElementById('msgs');
        m.innerHTML += `<div class="chat-msg"><b>Вы:</b> ${i.value}</div>`;
        i.value = '';
        m.scrollTop = m.scrollHeight;
    }

    // СНЕГ
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let w, h, flakes = [];
    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        flakes = Array(120).fill().map(() => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 3 + 1 }));
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "white";
        ctx.beginPath();
        flakes.forEach(f => {
            ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            f.y += 1.2; if(f.y > h) f.y = -10;
        });
        ctx.fill();
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
</script>

</body>
</html>
